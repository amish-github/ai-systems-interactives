<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classifying Reads by Freshness</title>
  <style>
    @font-face {
      font-family: 'Suisse Intl';
      src: url('https://d2jcw3k6onjdla.cloudfront.net/fonts/suisse/SuisseIntl-Regular-WebM.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Suisse Intl Mono';
      src: url('https://d2jcw3k6onjdla.cloudfront.net/fonts/suisse/SuisseIntlMono-Regular-WebS.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Suisse Intl', system-ui, -apple-system, sans-serif;
      font-size: 18px;
      color: #1A1A1A;
      background: #FFFFFF;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
    }

    /* ── Hint header ── */
    .hint-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 20px 24px 16px;
      border-bottom: 1px solid rgba(0,0,0,0.14);
    }

    .hint-header .cursor-icon {
      flex-shrink: 0;
      animation: cursor-wiggle 4s ease-in-out infinite;
    }

    @keyframes cursor-wiggle {
      0%   { transform: rotate(0deg); }
      10%  { transform: rotate(-10deg); }
      25%  { transform: rotate(10deg); }
      37%  { transform: rotate(-8deg); }
      50%  { transform: rotate(6deg); }
      62%  { transform: rotate(-3deg); }
      75%  { transform: rotate(0deg); }
      100% { transform: rotate(0deg); }
    }

    .hint-text {
      font-size: 18px;
      color: #1A1A1A;
      line-height: 1.4;
    }

    /* ── Game area ── */
    #game-area { padding-top: 24px; }

    /* Progress */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
      margin-bottom: 20px;
    }

    .progress-bar-wrap {
      flex: 1;
      height: 4px;
      background: rgba(0,0,0,0.12);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #1878DC;
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .progress-label {
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 14px;
      color: rgba(0,0,0,0.50);
      white-space: nowrap;
    }

    /* Scenario card */
    .scenario-area {
      padding: 0 24px;
      margin-bottom: 20px;
    }

    .scenario-card {
      background: #F2F1EE;
      border-radius: 12px;
      padding: 24px;
      min-height: 108px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: background 0.25s;
    }

    .scenario-tag {
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 12px;
      color: rgba(0,0,0,0.42);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .scenario-text {
      font-size: 18px;
      color: #1A1A1A;
      line-height: 1.55;
    }

    /* Choice buttons */
    .buttons-row {
      display: flex;
      gap: 12px;
      padding: 0 24px;
      margin-bottom: 20px;
    }

    .choice-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 16px;
      border: none;
      border-radius: 10px;
      font-family: 'Suisse Intl', system-ui, sans-serif;
      font-size: 16px;
      font-weight: 400;
      cursor: pointer;
      transition: opacity 0.15s ease, transform 0.12s ease, box-shadow 0.15s ease;
      box-shadow: 0 0 0.5px 0 rgba(0,0,0,0.30), 0 1px 3px 0 rgba(0,0,0,0.15);
      user-select: none;
    }

    .choice-btn:hover:not(:disabled) {
      opacity: 0.86;
      transform: translateY(-1px);
      box-shadow: 0 0 0.5px 0 rgba(0,0,0,0.30), 0 3px 8px 0 rgba(0,0,0,0.18);
    }

    .choice-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .choice-btn:disabled {
      cursor: default;
    }

    .btn-replica {
      background: #328F51;
      color: #FFFFFF;
    }

    .btn-primary-db {
      background: #D35722;
      color: #FFFFFF;
    }

    .btn-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .btn-main-label {
      font-size: 16px;
    }

    .btn-sub-label {
      font-size: 12px;
      opacity: 0.80;
    }

    /* Feedback */
    .feedback-area {
      padding: 0 24px;
      margin-bottom: 20px;
      min-height: 72px;
    }

    .feedback-card {
      display: none;
      gap: 12px;
      align-items: flex-start;
      border-radius: 10px;
      padding: 16px 20px;
    }

    .feedback-card.visible {
      display: flex;
    }

    .feedback-card.correct {
      background: rgba(50, 143, 81, 0.10);
      border: 1px solid rgba(50, 143, 81, 0.28);
    }

    .feedback-card.incorrect {
      background: rgba(222, 76, 69, 0.09);
      border: 1px solid rgba(222, 76, 69, 0.28);
    }

    .feedback-glyph {
      font-size: 18px;
      flex-shrink: 0;
      margin-top: 1px;
      line-height: 1;
    }

    .feedback-body { flex: 1; }

    .feedback-verdict {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .feedback-card.correct  .feedback-verdict { color: #328F51; }
    .feedback-card.incorrect .feedback-verdict { color: #DE4C45; }

    .feedback-explanation {
      font-size: 15px;
      color: #1A1A1A;
      line-height: 1.55;
    }

    .feedback-correct-chip {
      display: inline-block;
      margin-top: 8px;
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .feedback-correct-chip.replica {
      background: rgba(50, 143, 81, 0.12);
      color: #328F51;
    }

    .feedback-correct-chip.primary {
      background: rgba(211, 87, 34, 0.12);
      color: #D35722;
    }

    /* Next button */
    .next-area {
      padding: 0 24px;
      margin-bottom: 28px;
      display: none;
    }

    .next-area.visible { display: block; }

    .btn-next {
      width: 100%;
      padding: 16px;
      background: #1A1A1A;
      color: #FFFFFF;
      border: none;
      border-radius: 10px;
      font-family: 'Suisse Intl', system-ui, sans-serif;
      font-size: 16px;
      cursor: pointer;
      transition: opacity 0.15s;
      box-shadow: 0 0 0.5px 0 rgba(0,0,0,0.30), 0 1px 3px 0 rgba(0,0,0,0.15);
    }

    .btn-next:hover { opacity: 0.80; }

    /* ── Score screen ── */
    .score-screen {
      display: none;
      padding: 36px 24px 40px;
    }

    .score-screen.visible { display: block; }

    .score-top {
      text-align: center;
      margin-bottom: 28px;
    }

    .score-big {
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 60px;
      line-height: 1;
      color: #1A1A1A;
      margin-bottom: 8px;
    }

    .score-message {
      font-size: 18px;
      color: rgba(0,0,0,0.50);
      line-height: 1.4;
    }

    .score-summary {
      background: #F2F1EE;
      border-radius: 12px;
      padding: 20px 20px 8px;
      margin-bottom: 20px;
    }

    .score-summary-heading {
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 12px;
      color: rgba(0,0,0,0.42);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    .score-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-top: 1px solid rgba(0,0,0,0.08);
    }

    .score-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 6px;
    }

    .score-dot.correct   { background: #328F51; }
    .score-dot.incorrect { background: #DE4C45; }

    .score-item-text {
      flex: 1;
      font-size: 15px;
      color: #1A1A1A;
      line-height: 1.45;
    }

    .score-item-chip {
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .score-item-chip.replica  { background: rgba(50, 143, 81, 0.12);  color: #328F51; }
    .score-item-chip.primary { background: rgba(211, 87, 34, 0.12); color: #D35722; }

    .btn-restart {
      width: 100%;
      padding: 16px;
      background: #1878DC;
      color: #FFFFFF;
      border: none;
      border-radius: 10px;
      font-family: 'Suisse Intl', system-ui, sans-serif;
      font-size: 16px;
      cursor: pointer;
      transition: opacity 0.15s;
      box-shadow: 0 0 0.5px 0 rgba(0,0,0,0.30), 0 1px 3px 0 rgba(0,0,0,0.15);
    }

    .btn-restart:hover { opacity: 0.82; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .buttons-row { flex-direction: column; }
      .score-big   { font-size: 52px; }
    }

    @media (max-width: 325px) {
      .hint-header,
      .progress-row,
      .scenario-area,
      .buttons-row,
      .feedback-area,
      .next-area {
        padding-left: 16px;
        padding-right: 16px;
      }
      .score-screen { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Hint header -->
  <div class="hint-header">
    <svg class="cursor-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M9 3.5V2M5.06066 5.06066L4 4M5.06066 13L4 14.0607M13 5.06066L14.0607 4M3.5 9H2M15.8645 16.1896L13.3727 20.817C13.0881 21.3457 12.9457 21.61 12.7745 21.6769C12.6259 21.7349 12.4585 21.7185 12.324 21.6328C12.1689 21.534 12.0806 21.2471 11.9038 20.6733L8.44519 9.44525C8.3008 8.97651 8.2286 8.74213 8.28669 8.58383C8.33729 8.44595 8.44595 8.33729 8.58383 8.2867C8.74213 8.22861 8.9765 8.3008 9.44525 8.44519L20.6732 11.9038C21.247 12.0806 21.5339 12.169 21.6327 12.324C21.7185 12.4586 21.7348 12.6259 21.6768 12.7745C21.61 12.9458 21.3456 13.0881 20.817 13.3728L16.1896 15.8645C16.111 15.9068 16.0717 15.9279 16.0374 15.9551C16.0068 15.9792 15.9792 16.0068 15.9551 16.0374C15.9279 16.0717 15.9068 16.111 15.8645 16.1896Z" stroke="black" stroke-opacity="0.83" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="hint-text">Click to route each read — replica or primary?</span>
  </div>

  <!-- Game area -->
  <div id="game-area">
    <div class="progress-row">
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <span class="progress-label" id="progress-label">1 / 6</span>
    </div>

    <div class="scenario-area">
      <div class="scenario-card" id="scenario-card">
        <div class="scenario-tag">Read scenario</div>
        <div class="scenario-text" id="scenario-text"></div>
      </div>
    </div>

    <div class="buttons-row">
      <button class="choice-btn btn-replica" id="btn-replica" onclick="choose('replica')">
        <span style="font-size:20px">🗄</span>
        <span class="btn-label">
          <span class="btn-main-label">Read replica</span>
          <span class="btn-sub-label">eventual freshness</span>
        </span>
      </button>
      <button class="choice-btn btn-primary-db" id="btn-primary" onclick="choose('primary')">
        <span style="font-size:20px">⚡</span>
        <span class="btn-label">
          <span class="btn-main-label">Primary DB</span>
          <span class="btn-sub-label">always current</span>
        </span>
      </button>
    </div>

    <div class="feedback-area">
      <div class="feedback-card" id="feedback-card">
        <div class="feedback-glyph" id="feedback-glyph"></div>
        <div class="feedback-body">
          <div class="feedback-verdict" id="feedback-verdict"></div>
          <div class="feedback-explanation" id="feedback-explanation"></div>
          <span class="feedback-correct-chip" id="feedback-chip"></span>
        </div>
      </div>
    </div>

    <div class="next-area" id="next-area">
      <button class="btn-next" id="btn-next" onclick="nextScenario()">Next scenario →</button>
    </div>
  </div>

  <!-- Score screen -->
  <div class="score-screen" id="score-screen">
    <div class="score-top">
      <div class="score-big" id="final-score"></div>
      <div class="score-message" id="score-message"></div>
    </div>
    <div class="score-summary" id="score-summary"></div>
    <button class="btn-restart" onclick="restart()">Try again</button>
  </div>

</div>
<script>
  const SCENARIOS = [
    {
      text: "A public homepage loads a list of the 20 most recent blog posts. A new post was published 800 ms ago.",
      answer: "replica",
      explanation: "If the list is a second behind, the user sees 19 posts instead of 20 — essentially invisible. This tolerant, read-heavy query is exactly what replicas are designed for.",
      chipLabel: "Correct: Read replica"
    },
    {
      text: "A user renames their workspace. The app immediately reloads the settings page to confirm the new name appears.",
      answer: "primary",
      explanation: "This read follows the user's own write. A replica that has not yet replicated the change will show the old name, making the user think the save failed. Route the confirmation read to the primary.",
      chipLabel: "Correct: Primary DB"
    },
    {
      text: "A marketing analytics dashboard shows total sign-ups grouped by country over the last 90 days.",
      answer: "replica",
      explanation: "Aggregate reports over historical data are both expensive to run and tolerant of seconds of lag — the 90-day window makes a one-second delay irrelevant. Offloading this to a replica protects the primary.",
      chipLabel: "Correct: Read replica"
    },
    {
      text: "Before processing a payment, the app reads the user's current account balance to check whether sufficient funds are available.",
      answer: "primary",
      explanation: "A money decision must be made against the current truth. A replica that is even a fraction of a second behind could show a balance that was already spent, leading to an overdraft or a missed fraud check.",
      chipLabel: "Correct: Primary DB"
    },
    {
      text: "A permission check decides whether a user is still allowed to edit a shared document before letting the edit proceed.",
      answer: "primary",
      explanation: "Authorization decisions need the latest data. If permissions were revoked a moment ago and the check reads a lagging replica, it can grant access that should be denied — or block access that should be allowed.",
      chipLabel: "Correct: Primary DB"
    },
    {
      text: "A social activity feed shows the last 50 posts from people a user follows. New posts typically appear within a few seconds.",
      answer: "replica",
      explanation: "Social feeds are naturally approximate — users expect a slight delay before new posts appear. A second or two of lag is unnoticeable and the query is read-heavy, making it an ideal candidate for a replica.",
      chipLabel: "Correct: Read replica"
    }
  ];

  let idx = 0, score = 0, history = [];

  function init() {
    idx = 0; score = 0; history = [];
    document.getElementById('game-area').style.display = 'block';
    document.getElementById('score-screen').classList.remove('visible');
    render();
  }

  function render() {
    const s = SCENARIOS[idx];
    document.getElementById('scenario-text').textContent = s.text;
    document.getElementById('progress-label').textContent = (idx + 1) + ' / ' + SCENARIOS.length;
    document.getElementById('progress-fill').style.width = (idx / SCENARIOS.length * 100) + '%';

    // Reset UI
    const fc = document.getElementById('feedback-card');
    fc.className = 'feedback-card';
    document.getElementById('next-area').classList.remove('visible');
    document.getElementById('btn-replica').disabled = false;
    document.getElementById('btn-primary').disabled = false;
  }

  function choose(pick) {
    const s = SCENARIOS[idx];
    const correct = pick === s.answer;
    if (correct) score++;
    history.push({ correct, answer: s.answer, text: s.text });

    // Lock buttons
    document.getElementById('btn-replica').disabled = true;
    document.getElementById('btn-primary').disabled = true;

    // Feedback
    const fc = document.getElementById('feedback-card');
    fc.className = 'feedback-card visible ' + (correct ? 'correct' : 'incorrect');
    document.getElementById('feedback-glyph').textContent = correct ? '✓' : '✗';
    document.getElementById('feedback-verdict').textContent = correct ? 'Correct.' : 'Not quite.';
    document.getElementById('feedback-explanation').textContent = s.explanation;
    const chip = document.getElementById('feedback-chip');
    chip.textContent = s.chipLabel;
    chip.className = 'feedback-correct-chip ' + s.answer;

    // Next
    const na = document.getElementById('next-area');
    na.classList.add('visible');
    document.getElementById('btn-next').textContent =
      idx === SCENARIOS.length - 1 ? 'See results →' : 'Next scenario →';
  }

  function nextScenario() {
    idx++;
    if (idx >= SCENARIOS.length) {
      showScore();
    } else {
      render();
    }
  }

  function showScore() {
    document.getElementById('game-area').style.display = 'none';
    const ss = document.getElementById('score-screen');
    ss.classList.add('visible');

    document.getElementById('final-score').textContent = score + ' / ' + SCENARIOS.length;

    const msgs = [
      'Keep going — re-read the lesson and try again.',
      'Getting there — review the scenarios you missed.',
      'Good — look back at the ones you got wrong.',
      'Almost perfect — one more pass on the tricky case.',
      'Almost perfect — one more pass on the tricky case.',
      'Solid — you have a good feel for the tradeoffs.',
      'Perfect — you can classify reads with confidence.'
    ];
    document.getElementById('score-message').textContent = msgs[Math.min(score, 6)];

    // Build summary
    let html = '<div class="score-summary-heading">Your answers</div>';
    history.forEach((h, i) => {
      const short = SCENARIOS[i].text.length > 72
        ? SCENARIOS[i].text.slice(0, 70) + '…'
        : SCENARIOS[i].text;
      html += '<div class="score-item">'
        + '<div class="score-dot ' + (h.correct ? 'correct' : 'incorrect') + '"></div>'
        + '<div class="score-item-text">' + short + '</div>'
        + '<div class="score-item-chip ' + h.answer + '">' + (h.answer === 'replica' ? 'Replica' : 'Primary') + '</div>'
        + '</div>';
    });
    document.getElementById('score-summary').innerHTML = html;
  }

  function restart() { init(); }

  init();
</script>
</body>
</html>
