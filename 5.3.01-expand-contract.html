<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expand and Contract: Schema Change Pattern</title>
<style>
@font-face {
  font-family: 'Suisse Intl';
  src: url('https://d2jcw3k6onjdla.cloudfront.net/fonts/suisse/SuisseIntl-Regular-WebM.woff2') format('woff2');
}
@font-face {
  font-family: 'Suisse Intl Mono';
  src: url('https://d2jcw3k6onjdla.cloudfront.net/fonts/suisse/SuisseIntlMono-Regular-WebS.woff2') format('woff2');
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Suisse Intl', system-ui, sans-serif;
  font-size: 18px;
  color: #1A1A1A;
  background: #FFFFFF;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 700px;
  background: #FFFFFF;
}

@keyframes cursor-wiggle {
  0%, 100% { transform: rotate(0deg); }
  15%       { transform: rotate(-10deg); }
  30%       { transform: rotate(10deg); }
  45%       { transform: rotate(-8deg); }
  60%       { transform: rotate(6deg); }
  75%       { transform: rotate(-3deg); }
}

/* ---- HINT HEADER ---- */
.hint-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  border-bottom: 1px solid rgba(0,0,0,0.14);
  font-size: 18px;
  line-height: 1.4;
}
.cursor-icon {
  flex-shrink: 0;
  animation: cursor-wiggle 4s ease-in-out infinite;
}

/* ---- PROGRESS BAR ---- */
.progress-bar {
  display: flex;
  align-items: center;
  padding: 20px 20px 0;
}
.prog-dot {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1.5px solid rgba(0,0,0,0.14);
  background: #FFF; color: rgba(0,0,0,0.40);
  font-family: 'Suisse Intl Mono', monospace; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.25s;
}
.prog-dot.active { background: #1A1A1A; border-color: #1A1A1A; color: #FFF; }
.prog-dot.done   { background: #328F51; border-color: #328F51; color: #FFF; font-size: 12px; }
.prog-line {
  flex: 1; height: 1.5px; background: rgba(0,0,0,0.14); transition: background 0.25s;
}
.prog-line.done { background: #328F51; }

/* ---- STEP HEADER ---- */
.step-header {
  padding: 12px 20px 0;
}
.phase-badge {
  display: inline-flex; align-items: center;
  font-family: 'Suisse Intl Mono', monospace;
  font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 4px; margin-bottom: 8px;
}
.phase-before     { background: #F2F1EE; color: rgba(0,0,0,0.5); }
.phase-expand     { background: rgba(24,120,220,0.10); color: #1878DC; }
.phase-backfill   { background: rgba(244,142,0,0.12); color: #C27800; }
.phase-switchover { background: rgba(50,143,81,0.10); color: #328F51; }
.phase-contract   { background: rgba(222,76,69,0.10); color: #DE4C45; }

.step-title {
  font-size: 16px; color: #1A1A1A; line-height: 1.5;
}

/* ---- VISUAL AREA ---- */
.visual-area {
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* DB PANEL */
.db-panel {
  background: #F2F1EE;
  border-radius: 12px;
  padding: 16px;
  box-shadow: 0 0 0.5px 0 rgba(0,0,0,0.30), 0 1px 3px 0 rgba(0,0,0,0.15);
}
.panel-label {
  font-family: 'Suisse Intl Mono', monospace;
  font-size: 12px; text-transform: uppercase; letter-spacing: 0.07em;
  color: rgba(0,0,0,0.45); margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.columns-wrap {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
}
.col-chip {
  display: inline-flex; align-items: baseline; gap: 5px;
  padding: 5px 10px; border-radius: 8px;
  font-family: 'Suisse Intl Mono', monospace; font-size: 13px;
  border: 1.5px solid transparent; transition: all 0.3s ease;
}
.col-chip .cname { font-size: 13px; }
.col-chip .ctype { font-size: 11px; opacity: 0.50; }
.col-chip .cnull {
  font-size: 10px; padding: 1px 4px; border-radius: 3px; margin-left: 2px;
}
.chip-stable { background: #FFF; border-color: rgba(0,0,0,0.12); color: #1A1A1A; }
.chip-stable .cnull { background: rgba(0,0,0,0.07); color: rgba(0,0,0,0.5); }
.chip-old { background: rgba(222,76,69,0.07); border-color: rgba(222,76,69,0.28); color: #C44040; }
.chip-old .cnull { background: rgba(222,76,69,0.10); color: #C44040; }
.chip-new { background: rgba(50,143,81,0.07); border-color: rgba(50,143,81,0.28); color: #2A7A45; }
.chip-new .cnull { background: rgba(50,143,81,0.10); color: #2A7A45; }

@keyframes chipAppear {
  from { opacity: 0; transform: scale(0.88) translateY(-3px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.chip-entering { animation: chipAppear 0.35s ease; }

/* DATA TABLE */
.data-section {
  border-top: 1px solid rgba(0,0,0,0.10); padding-top: 10px;
}
.data-section-label {
  font-family: 'Suisse Intl Mono', monospace;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
  color: rgba(0,0,0,0.38); margin-bottom: 6px;
}
.data-table {
  width: 100%; border-collapse: collapse;
  font-family: 'Suisse Intl Mono', monospace; font-size: 13px;
}
.data-table th {
  text-align: left; padding: 3px 8px 5px;
  font-weight: 400; font-size: 11px;
  letter-spacing: 0.05em; text-transform: uppercase;
  color: rgba(0,0,0,0.38);
  border-bottom: 1px solid rgba(0,0,0,0.10);
}
.data-table th.th-old { color: #C44040; }
.data-table th.th-new { color: #2A7A45; }
.data-table td { padding: 5px 8px; }
.td-id   { color: rgba(0,0,0,0.38); }
.td-old  { color: #C44040; }
.td-null { color: rgba(0,0,0,0.28); font-style: italic; }
.td-new  { color: #2A7A45; }

/* APP PANEL */
.app-panel {
  background: #FFF;
  border: 1.5px solid rgba(0,0,0,0.14);
  border-radius: 12px;
  padding: 14px 16px;
  box-shadow: 0 0 0.5px 0 rgba(0,0,0,0.30), 0 1px 3px 0 rgba(0,0,0,0.15);
}
.code-block {
  font-family: 'Suisse Intl Mono', monospace; font-size: 14px;
  background: #F2F1EE; padding: 10px 12px; border-radius: 8px;
  line-height: 1.7; white-space: pre; overflow-x: auto;
}
.code-old { color: #C44040; }
.code-new { color: #2A7A45; }
.code-dim { color: rgba(0,0,0,0.35); }

/* SAFETY PANEL */
.safety {
  display: flex; gap: 10px; padding: 12px 14px;
  border-radius: 10px;
  border: 1.5px solid rgba(50,143,81,0.25);
  background: rgba(50,143,81,0.05);
  align-items: flex-start;
}
.safety.neutral {
  border-color: rgba(0,0,0,0.12);
  background: #F2F1EE;
}
.safety-icon { flex-shrink: 0; font-size: 16px; line-height: 1.55; }
.safety-msg {
  font-size: 15px; line-height: 1.5; color: #1A1A1A;
}
.safety-msg strong { color: #2A7A45; }
.safety.neutral .safety-msg strong { color: #1A1A1A; }
.safety-msg code {
  font-family: 'Suisse Intl Mono', monospace; font-size: 13px;
  background: rgba(0,0,0,0.07); padding: 1px 4px; border-radius: 3px;
}

/* NAV */
.nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 20px 24px;
}
.nav-btn {
  font-family: 'Suisse Intl', system-ui, sans-serif;
  font-size: 16px; padding: 10px 20px; border-radius: 10px;
  border: 1.5px solid rgba(0,0,0,0.14);
  background: #FFF; color: #1A1A1A; cursor: pointer;
  transition: background 0.15s, opacity 0.15s;
  box-shadow: 0 0 0.5px 0 rgba(0,0,0,0.20), 0 1px 3px 0 rgba(0,0,0,0.10);
}
.nav-btn:hover:not(:disabled) { background: #F2F1EE; }
.nav-btn:disabled { opacity: 0.30; cursor: default; }
.nav-btn.primary {
  background: #1A1A1A; border-color: #1A1A1A; color: #FFF;
}
.nav-btn.primary:hover:not(:disabled) { background: #333; }
.nav-count {
  font-family: 'Suisse Intl Mono', monospace;
  font-size: 13px; color: rgba(0,0,0,0.45);
}

/* RESPONSIVE */
@media (max-width: 480px) {
  .step-title { font-size: 15px; }
  .col-chip { font-size: 12px; padding: 4px 8px; }
  .col-chip .cname { font-size: 12px; }
  .data-table { font-size: 12px; }
  .code-block { font-size: 13px; }
  .safety-msg { font-size: 14px; }
}
@media (max-width: 360px) {
  .hint-header { padding: 12px 16px; font-size: 16px; }
  .progress-bar { padding: 16px 16px 0; }
  .step-header { padding: 10px 16px 0; }
  .visual-area { padding: 12px 16px; }
  .nav { padding: 4px 16px 20px; }
  .nav-btn { padding: 8px 12px; font-size: 15px; }
}
</style>
</head>
<body>
<div class="container">

  <!-- Hint header -->
  <div class="hint-header">
    <svg class="cursor-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M9 3.5V2M5.06066 5.06066L4 4M5.06066 13L4 14.0607M13 5.06066L14.0607 4M3.5 9H2M15.8645 16.1896L13.3727 20.817C13.0881 21.3457 12.9457 21.61 12.7745 21.6769C12.6259 21.7349 12.4585 21.7185 12.324 21.6328C12.1689 21.534 12.0806 21.2471 11.9038 20.6733L8.44519 9.44525C8.3008 8.97651 8.2286 8.74213 8.28669 8.58383C8.33729 8.44595 8.44595 8.33729 8.58383 8.2867C8.74213 8.22861 8.9765 8.3008 9.44525 8.44519L20.6732 11.9038C21.247 12.0806 21.5339 12.169 21.6327 12.324C21.7185 12.4586 21.7348 12.6259 21.6768 12.7745C21.61 12.9458 21.3456 13.0881 20.817 13.3728L16.1896 15.8645C16.111 15.9068 16.0717 15.9279 16.0374 15.9551C16.0068 15.9792 15.9792 16.0068 15.9551 16.0374C15.9279 16.0717 15.9068 16.111 15.8645 16.1896Z" stroke="black" stroke-opacity="0.83" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Step through a live schema rename using expand and contract
  </div>

  <!-- Progress bar -->
  <div class="progress-bar" id="progressBar"></div>

  <!-- Step header -->
  <div class="step-header">
    <div id="phaseBadge" class="phase-badge"></div>
    <div id="stepTitle" class="step-title"></div>
  </div>

  <!-- Visual area -->
  <div class="visual-area">

    <!-- Database panel -->
    <div class="db-panel">
      <div class="panel-label">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <ellipse cx="7" cy="3.5" rx="5" ry="1.75" stroke="rgba(0,0,0,0.45)" stroke-width="1.3"/>
          <path d="M2 3.5v3.5c0 .967 2.239 1.75 5 1.75s5-.783 5-1.75V3.5" stroke="rgba(0,0,0,0.45)" stroke-width="1.3"/>
          <path d="M2 7v3.5C2 11.467 4.239 12.25 7 12.25s5-.783 5-1.75V7" stroke="rgba(0,0,0,0.45)" stroke-width="1.3"/>
        </svg>
        api_keys table schema
      </div>
      <div class="columns-wrap" id="columnsWrap"></div>
      <div class="data-section">
        <div class="data-section-label">sample rows</div>
        <table class="data-table" id="dataTable"></table>
      </div>
    </div>

    <!-- App panel -->
    <div class="app-panel">
      <div class="panel-label">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="1.5" y="2" width="11" height="8.5" rx="1.5" stroke="rgba(0,0,0,0.45)" stroke-width="1.3"/>
          <path d="M4.5 12.5h5" stroke="rgba(0,0,0,0.45)" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M7 10.5v2" stroke="rgba(0,0,0,0.45)" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        running application
      </div>
      <div class="code-block" id="codeBlock"></div>
    </div>

    <!-- Safety panel -->
    <div class="safety" id="safetyPanel">
      <span class="safety-icon" id="safetyIcon"></span>
      <span class="safety-msg" id="safetyMsg"></span>
    </div>

  </div>

  <!-- Navigation -->
  <div class="nav">
    <button class="nav-btn" id="prevBtn" onclick="go(-1)">&larr; Back</button>
    <span class="nav-count" id="navCount"></span>
    <button class="nav-btn primary" id="nextBtn" onclick="go(1)">Next &rarr;</button>
  </div>

</div>
<script>
var STEPS = [
  {
    phaseClass: 'phase-before',
    phaseLabel: 'Before',
    title: 'Goal: rename the label column to name. The table currently has only label.',
    neutral: true,
    safetyIcon: '○',
    columns: [
      {name:'id',         type:'integer',   state:'stable', nullable:false},
      {name:'key_hash',   type:'text',      state:'stable', nullable:false},
      {name:'label',      type:'text',      state:'old',    nullable:false},
      {name:'created_at', type:'timestamp', state:'stable', nullable:false},
      {name:'revoked_at', type:'timestamp', state:'stable', nullable:true},
    ],
    dataHeaders: ['id','label'],
    dataRows: [
      {id:'1', label:'ci runner'},
      {id:'2', label:'staging bot'},
    ],
    codeLines: [
      {text:'# app reads the column:', cls:'code-dim'},
      {text:'value = key.label',       cls:'code-old'},
    ],
    safetyText: '<strong>Starting state.</strong> Only <code>label</code> exists. The app uses it. Nothing is broken — this is the baseline before any migration runs.',
  },
  {
    phaseClass: 'phase-expand',
    phaseLabel: 'Step 1 — Expand',
    title: 'Add name as a nullable column alongside label. Both columns now exist in the table.',
    neutral: false,
    safetyIcon: '✓',
    entering: 'name',
    columns: [
      {name:'id',         type:'integer',   state:'stable', nullable:false},
      {name:'key_hash',   type:'text',      state:'stable', nullable:false},
      {name:'label',      type:'text',      state:'old',    nullable:false},
      {name:'name',       type:'text',      state:'new',    nullable:true, entering:true},
      {name:'created_at', type:'timestamp', state:'stable', nullable:false},
      {name:'revoked_at', type:'timestamp', state:'stable', nullable:true},
    ],
    dataHeaders: ['id','label','name'],
    dataRows: [
      {id:'1', label:'ci runner',   name:null},
      {id:'2', label:'staging bot', name:null},
    ],
    codeLines: [
      {text:'# app still reads:',  cls:'code-dim'},
      {text:'value = key.label',   cls:'code-old'},
      {text:'# name is ignored',   cls:'code-dim'},
    ],
    safetyText: '<strong>Safe — adding never breaks.</strong> <code>name</code> is nullable, so existing rows need no value for it. The running app never touches the new column yet.',
  },
  {
    phaseClass: 'phase-backfill',
    phaseLabel: 'Step 2 — Backfill',
    title: 'Run a migration that copies label into name for every existing row.',
    neutral: false,
    safetyIcon: '✓',
    columns: [
      {name:'id',         type:'integer',   state:'stable', nullable:false},
      {name:'key_hash',   type:'text',      state:'stable', nullable:false},
      {name:'label',      type:'text',      state:'old',    nullable:false},
      {name:'name',       type:'text',      state:'new',    nullable:true},
      {name:'created_at', type:'timestamp', state:'stable', nullable:false},
      {name:'revoked_at', type:'timestamp', state:'stable', nullable:true},
    ],
    dataHeaders: ['id','label','name'],
    dataRows: [
      {id:'1', label:'ci runner',   name:'ci runner'},
      {id:'2', label:'staging bot', name:'staging bot'},
    ],
    codeLines: [
      {text:'# app still reads:',    cls:'code-dim'},
      {text:'value = key.label',     cls:'code-old'},
      {text:'# backfill runs in bg', cls:'code-dim'},
    ],
    safetyText: '<strong>Safe — old column untouched.</strong> The app keeps reading <code>label</code> uninterrupted while the migration backfills <code>name</code> for all existing rows.',
  },
  {
    phaseClass: 'phase-switchover',
    phaseLabel: 'Step 3 — Switch over',
    title: 'Deploy new application code that reads and writes name instead of label.',
    neutral: false,
    safetyIcon: '✓',
    columns: [
      {name:'id',         type:'integer',   state:'stable', nullable:false},
      {name:'key_hash',   type:'text',      state:'stable', nullable:false},
      {name:'label',      type:'text',      state:'old',    nullable:false},
      {name:'name',       type:'text',      state:'new',    nullable:true},
      {name:'created_at', type:'timestamp', state:'stable', nullable:false},
      {name:'revoked_at', type:'timestamp', state:'stable', nullable:true},
    ],
    dataHeaders: ['id','label','name'],
    dataRows: [
      {id:'1', label:'ci runner',   name:'ci runner'},
      {id:'2', label:'staging bot', name:'staging bot'},
    ],
    codeLines: [
      {text:'# app now reads:',   cls:'code-dim'},
      {text:'value = key.name',   cls:'code-new'},
      {text:'# label exists but nothing reads it', cls:'code-dim'},
    ],
    safetyText: '<strong>Safe — name is fully populated.</strong> Because backfill ran first, every row has a value for <code>name</code>. The switch is uneventful — no null reads, no errors.',
  },
  {
    phaseClass: 'phase-contract',
    phaseLabel: 'Step 4 — Contract',
    title: 'Drop label in a later migration. Nothing reads it anymore — the rename is complete.',
    neutral: false,
    safetyIcon: '✓',
    columns: [
      {name:'id',         type:'integer',   state:'stable', nullable:false},
      {name:'key_hash',   type:'text',      state:'stable', nullable:false},
      {name:'name',       type:'text',      state:'new',    nullable:true},
      {name:'created_at', type:'timestamp', state:'stable', nullable:false},
      {name:'revoked_at', type:'timestamp', state:'stable', nullable:true},
    ],
    dataHeaders: ['id','name'],
    dataRows: [
      {id:'1', name:'ci runner'},
      {id:'2', name:'staging bot'},
    ],
    codeLines: [
      {text:'# app reads:',       cls:'code-dim'},
      {text:'value = key.name',   cls:'code-new'},
      {text:'# label is gone — rename complete', cls:'code-dim'},
    ],
    safetyText: '<strong>Safe — removal only after the switch.</strong> Dropping <code>label</code> is safe only because no code reads it. This step always runs in a separate, later deployment.',
  },
];

var cur = 0;

function chipClass(state) {
  if (state === 'old') return 'chip-old';
  if (state === 'new') return 'chip-new';
  return 'chip-stable';
}

function renderProgress() {
  var bar = document.getElementById('progressBar');
  bar.innerHTML = '';
  for (var i = 0; i < STEPS.length; i++) {
    var dot = document.createElement('div');
    dot.className = 'prog-dot' + (i < cur ? ' done' : i === cur ? ' active' : '');
    dot.textContent = i < cur ? '✓' : String(i + 1);
    bar.appendChild(dot);
    if (i < STEPS.length - 1) {
      var line = document.createElement('div');
      line.className = 'prog-line' + (i < cur ? ' done' : '');
      bar.appendChild(line);
    }
  }
}

function renderColumns(s) {
  var wrap = document.getElementById('columnsWrap');
  wrap.innerHTML = '';
  s.columns.forEach(function(col) {
    var chip = document.createElement('div');
    chip.className = 'col-chip ' + chipClass(col.state) + (col.entering ? ' chip-entering' : '');
    chip.innerHTML =
      '<span class="cname">' + col.name + '</span>' +
      '<span class="ctype">' + col.type + '</span>' +
      (col.nullable ? '<span class="cnull">null</span>' : '');
    wrap.appendChild(chip);
  });
}

function renderData(s) {
  var tbl = document.getElementById('dataTable');
  tbl.innerHTML = '';

  var thead = document.createElement('thead');
  var trh = document.createElement('tr');
  s.dataHeaders.forEach(function(h) {
    var th = document.createElement('th');
    th.textContent = h;
    if (h === 'label') th.className = 'th-old';
    else if (h === 'name') th.className = 'th-new';
    trh.appendChild(th);
  });
  thead.appendChild(trh);
  tbl.appendChild(thead);

  var tbody = document.createElement('tbody');
  s.dataRows.forEach(function(row) {
    var tr = document.createElement('tr');
    s.dataHeaders.forEach(function(h) {
      var td = document.createElement('td');
      var val = row[h];
      if (h === 'id') {
        td.className = 'td-id';
        td.textContent = val;
      } else if (h === 'label') {
        td.className = 'td-old';
        td.textContent = val;
      } else if (h === 'name') {
        if (val === null || val === undefined) {
          td.className = 'td-null';
          td.textContent = 'null';
        } else {
          td.className = 'td-new';
          td.textContent = val;
        }
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
}

function renderStep() {
  var s = STEPS[cur];

  var badge = document.getElementById('phaseBadge');
  badge.className = 'phase-badge ' + s.phaseClass;
  badge.textContent = s.phaseLabel;
  document.getElementById('stepTitle').textContent = s.title;

  renderColumns(s);
  renderData(s);

  var codeEl = document.getElementById('codeBlock');
  codeEl.innerHTML = s.codeLines
    .map(function(l) { return '<span class="' + l.cls + '">' + l.text + '</span>'; })
    .join('\n');

  var safetyEl = document.getElementById('safetyPanel');
  safetyEl.className = 'safety' + (s.neutral ? ' neutral' : '');
  document.getElementById('safetyIcon').textContent = s.safetyIcon;
  document.getElementById('safetyMsg').innerHTML = s.safetyText;

  document.getElementById('prevBtn').disabled = cur === 0;
  var nb = document.getElementById('nextBtn');
  nb.disabled = cur === STEPS.length - 1;
  document.getElementById('navCount').textContent = (cur + 1) + ' / ' + STEPS.length;

  renderProgress();
}

function go(dir) {
  var n = cur + dir;
