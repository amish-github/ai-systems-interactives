<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Request Lifecycle — Interactive</title>
  <style>
    @font-face {
      font-family: 'Suisse Intl';
      src: url('https://d2jcw3k6onjdla.cloudfront.net/fonts/suisse/SuisseIntl-Regular-WebM.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Suisse Intl Mono';
      src: url('https://d2jcw3k6onjdla.cloudfront.net/fonts/suisse/SuisseIntlMono-Regular-WebS.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      font-family: 'Suisse Intl', system-ui, -apple-system, sans-serif;
      font-size: 18px;
      line-height: 1.5;
      color: #1A1A1A;
      background: #FFFFFF;
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
    }

    /* ─── Hint bar ─── */
    .hint-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(0,0,0,0.14);
    }
    .hint-bar .cursor-icon {
      flex-shrink: 0;
      animation: cursor-wiggle 4s ease-in-out infinite;
    }
    @keyframes cursor-wiggle {
      0%, 90%, 100% { transform: rotate(0deg); }
      15%            { transform: rotate(-10deg); }
      30%            { transform: rotate(10deg); }
      45%            { transform: rotate(-8deg); }
      60%            { transform: rotate(6deg); }
      75%            { transform: rotate(-3deg); }
    }
    .hint-bar .hint-text {
      font-size: 18px;
      color: rgba(0,0,0,0.83);
    }

    /* ─── Pipeline ─── */
    .pipeline-outer {
      padding: 20px 20px 0;
    }
    .pipeline-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 4px;
    }
    .pipeline-scroll::-webkit-scrollbar { display: none; }
    .pipeline {
      display: flex;
      align-items: flex-start;
      min-width: max-content;
    }
    .comp-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .comp-node {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      border: 1.5px solid rgba(0,0,0,0.14);
      background: #F2F1EE;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: default;
      transition: background 0.25s ease, border-color 0.25s ease,
                  transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 0 0.5px 0 rgba(0,0,0,0.30), 0 1px 3px 0 rgba(0,0,0,0.15);
    }
    .comp-label {
      font-size: 11px;
      color: rgba(0,0,0,0.40);
      text-align: center;
      line-height: 1.3;
      max-width: 56px;
    }
    .comp-node.state-active-out {
      background: #1878DC;
      border-color: #1878DC;
      transform: scale(1.10);
      box-shadow: 0 0 0 4px rgba(24,120,220,0.18), 0 2px 8px rgba(24,120,220,0.28);
    }
    .comp-node.state-active-in {
      background: #328F51;
      border-color: #328F51;
      transform: scale(1.10);
      box-shadow: 0 0 0 4px rgba(50,143,81,0.18), 0 2px 8px rgba(50,143,81,0.28);
    }
    .comp-node.state-done {
      background: #EAF6ED;
      border-color: rgba(50,143,81,0.28);
    }
    .pipe-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 56px;
      color: rgba(0,0,0,0.22);
      font-size: 16px;
      flex-shrink: 0;
    }

    /* ─── Direction pill ─── */
    .direction-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 12px 20px 0;
    }
    .direction-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 6px;
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 12px;
      transition: background 0.25s, color 0.25s;
    }
    .direction-pill.out {
      background: rgba(24,120,220,0.10);
      color: #1878DC;
      border: 1px solid rgba(24,120,220,0.18);
    }
    .direction-pill.in {
      background: rgba(50,143,81,0.10);
      color: #328F51;
      border: 1px solid rgba(50,143,81,0.18);
    }
    .dir-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* ─── Progress ─── */
    .progress-bar {
      height: 3px;
      background: rgba(0,0,0,0.08);
      margin: 12px 20px 0;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #1878DC 0%, #328F51 100%);
      border-radius: 2px;
      transition: width 0.35s ease;
    }

    /* ─── Step card ─── */
    .step-section {
      padding: 20px 20px 0;
    }
    .step-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .step-num {
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 12px;
      color: rgba(0,0,0,0.40);
      background: #F2F1EE;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.10);
    }
    .step-dir-tag {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 4px;
      font-family: 'Suisse Intl Mono', monospace;
      border: 1px solid transparent;
    }
    .step-dir-tag.out { color: #1878DC; background: rgba(24,120,220,0.08); border-color: rgba(24,120,220,0.18); }
    .step-dir-tag.in  { color: #328F51; background: rgba(50,143,81,0.08); border-color: rgba(50,143,81,0.18); }
    .step-title {
      font-size: 20px;
      font-weight: 500;
      color: #1A1A1A;
      margin-bottom: 16px;
    }
    .step-card {
      background: #F2F1EE;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 0 0.5px 0 rgba(0,0,0,0.20), 0 1px 3px 0 rgba(0,0,0,0.08);
    }
    .detail-row {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-lbl {
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(0,0,0,0.38);
      margin-bottom: 4px;
    }
    .detail-val {
      font-size: 15px;
      color: #1A1A1A;
      line-height: 1.55;
    }
    .detail-val.mono {
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 14px;
    }

    /* ─── Branch buttons ─── */
    .branch-section {
      padding: 20px 20px 0;
      display: none;
    }
    .branch-section.visible { display: block; }
    .branch-prompt {
      font-size: 14px;
      color: rgba(0,0,0,0.45);
      text-align: center;
      margin-bottom: 12px;
      font-family: 'Suisse Intl Mono', monospace;
    }
    .branch-btns {
      display: flex;
      gap: 12px;
    }
    .branch-btn {
      flex: 1;
      padding: 16px 12px;
      border-radius: 12px;
      border: 1.5px solid rgba(0,0,0,0.14);
      background: #FFFFFF;
      cursor: pointer;
      font-family: 'Suisse Intl', system-ui, sans-serif;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease;
      text-align: center;
      box-shadow: 0 0 0.5px 0 rgba(0,0,0,0.30), 0 1px 3px 0 rgba(0,0,0,0.15);
    }
    .branch-btn:hover { transform: translateY(-2px); }
    .branch-btn:active { transform: translateY(0); }
    .branch-btn.hit:hover  { border-color: #328F51; background: #EAF6ED; }
    .branch-btn.miss:hover { border-color: #D35722; background: #FFF3EC; }
    .branch-icon { font-size: 28px; margin-bottom: 8px; }
    .branch-name { font-size: 15px; font-weight: 500; color: #1A1A1A; margin-bottom: 4px; }
    .branch-desc { font-size: 13px; color: rgba(0,0,0,0.45); line-height: 1.4; }

    /* ─── Latency chip on complete ─── */
    .latency-strip {
      display: none;
      margin: 16px 20px 0;
      padding: 12px 16px;
      border-radius: 8px;
      align-items: center;
      gap: 12px;
    }
    .latency-strip.visible { display: flex; }
    .latency-strip.hit  { background: #EAF6ED; border: 1px solid rgba(50,143,81,0.22); }
    .latency-strip.miss { background: #FFF3EC; border: 1px solid rgba(211,87,34,0.22); }
    .latency-icon { font-size: 20px; flex-shrink: 0; }
    .latency-msg  { font-size: 14px; color: #1A1A1A; }
    .latency-time { font-family: 'Suisse Intl Mono', monospace; font-size: 13px; color: rgba(0,0,0,0.5); margin-top: 2px; }

    /* ─── Navigation ─── */
    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 24px;
      gap: 8px;
    }
    .nav-btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,0.14);
      background: #FFFFFF;
      cursor: pointer;
      font-family: 'Suisse Intl', system-ui, sans-serif;
      font-size: 15px;
      color: #1A1A1A;
      transition: background 0.15s, opacity 0.15s, transform 0.15s;
      box-shadow: 0 0 0.5px 0 rgba(0,0,0,0.30), 0 1px 3px 0 rgba(0,0,0,0.15);
      white-space: nowrap;
    }
    .nav-btn:hover:not(:disabled) { background: #F2F1EE; }
    .nav-btn:active:not(:disabled) { transform: scale(0.97); }
    .nav-btn:disabled { opacity: 0.28; cursor: default; pointer-events: none; }
    .nav-btn.next {
      background: #1A1A1A;
      color: #FFFFFF;
      border-color: #1A1A1A;
    }
    .nav-btn.next:hover:not(:disabled) { background: #333333; }
    .nav-counter {
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 12px;
      color: rgba(0,0,0,0.38);
      text-align: center;
      flex: 1;
      white-space: nowrap;
    }

    @media (max-width: 480px) {
      .hint-bar .hint-text { font-size: 16px; }
      .step-title { font-size: 18px; }
      .branch-btns { flex-direction: column; }
      .branch-icon { font-size: 24px; margin-bottom: 4px; }
    }
  </style>
</head>
<body>

  <!-- Hint bar -->
  <div class="hint-bar">
    <svg class="cursor-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M9 3.5V2M5.06066 5.06066L4 4M5.06066 13L4 14.0607M13 5.06066L14.0607 4M3.5 9H2M15.8645 16.1896L13.3727 20.817C13.0881 21.3457 12.9457 21.61 12.7745 21.6769C12.6259 21.7349 12.4585 21.7185 12.324 21.6328C12.1689 21.534 12.0806 21.2471 11.9038 20.6733L8.44519 9.44525C8.3008 8.97651 8.2286 8.74213 8.28669 8.58383C8.33729 8.44595 8.44595 8.33729 8.58383 8.2867C8.74213 8.22861 8.9765 8.3008 9.44525 8.44519L20.6732 11.9038C21.247 12.0806 21.5339 12.169 21.6327 12.324C21.7185 12.4586 21.7348 12.6259 21.6768 12.7745C21.61 12.9458 21.3456 13.0881 20.817 13.3728L16.1896 15.8645C16.111 15.9068 16.0717 15.9279 16.0374 15.9551C16.0068 15.9792 15.9792 16.0068 15.9551 16.0374C15.9279 16.0717 15.9068 16.111 15.8645 16.1896Z" stroke="black" stroke-opacity="0.83" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="hint-text">Step through a read request hop by hop</span>
  </div>

  <!-- Pipeline diagram -->
  <div class="pipeline-outer">
    <div class="pipeline-scroll">
      <div class="pipeline" id="pipeline">
        <div class="comp-wrap">
          <div class="comp-node" id="node-client">👤</div>
          <div class="comp-label">Client</div>
        </div>
        <div class="pipe-arrow">→</div>
        <div class="comp-wrap">
          <div class="comp-node" id="node-dns">🌐</div>
          <div class="comp-label">DNS</div>
        </div>
        <div class="pipe-arrow">→</div>
        <div class="comp-wrap">
          <div class="comp-node" id="node-lb">⚖️</div>
          <div class="comp-label">Load<br>Balancer</div>
        </div>
        <div class="pipe-arrow">→</div>
        <div class="comp-wrap">
          <div class="comp-node" id="node-gw">🛡️</div>
          <div class="comp-label">API<br>Gateway</div>
        </div>
        <div class="pipe-arrow">→</div>
        <div class="comp-wrap">
          <div class="comp-node" id="node-svc">⚙️</div>
          <div class="comp-label">App<br>Service</div>
        </div>
        <div class="pipe-arrow">→</div>
        <div class="comp-wrap">
          <div class="comp-node" id="node-cache">⚡</div>
          <div class="comp-label">Cache</div>
        </div>
        <div class="pipe-arrow">→</div>
        <div class="comp-wrap">
          <div class="comp-node" id="node-db">🗄️</div>
          <div class="comp-label">Database</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Direction pill -->
  <div class="direction-bar">
    <div class="direction-pill out" id="direction-pill">
      <div class="dir-dot"></div>
      <span id="direction-label">Request travelling inbound →</span>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
  </div>

  <!-- Step info -->
  <div class="step-section" id="step-section">
    <div class="step-meta">
      <span class="step-num" id="step-num">Step 1</span>
      <span class="step-dir-tag out" id="step-dir-tag">→ Request</span>
    </div>
    <div class="step-title" id="step-title"></div>
    <div class="step-card">
      <div class="detail-row">
        <div class="detail-lbl">What changes</div>
        <div class="detail-val" id="detail-what"></div>
      </div>
      <div class="detail-row">
        <div class="detail-lbl">How it can fail</div>
        <div class="detail-val" id="detail-fails"></div>
      </div>
      <div class="detail-row">
        <div class="detail-lbl">Time added</div>
        <div class="detail-val mono" id="detail-time"></div>
      </div>
    </div>
  </div>

  <!-- Branch choice -->
  <div class="branch-section" id="branch-section">
    <div class="branch-prompt">Choose what happens next</div>
    <div class="branch-btns">
      <button class="branch-btn hit" onclick="choosePath('hit')">
        <div class="branch-icon">⚡</div>
        <div class="branch-name">Cache Hit</div>
        <div class="branch-desc">Data is in the cache — skip the database</div>
      </button>
      <button class="branch-btn miss" onclick="choosePath('miss')">
        <div class="branch-icon">🔍</div>
        <div class="branch-name">Cache Miss</div>
        <div class="branch-desc">Not found — must fetch from the database</div>
      </button>
    </div>
  </div>

  <!-- Latency strip (shown on complete) -->
  <div class="latency-strip" id="latency-strip">
    <div class="latency-icon" id="latency-icon">✓</div>
    <div>
      <div class="latency-msg">Round trip complete</div>
      <div class="latency-time" id="latency-time"></div>
    </div>
  </div>

  <!-- Navigation -->
  <div class="nav-bar">
    <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">← Previous</button>
    <span class="nav-counter" id="nav-counter">Step 1 of ?</span>
    <button class="nav-btn next" id="next-btn" onclick="navigate(1)">Next →</button>
    <button class="nav-btn" id="restart-btn" onclick="restart()" style="display:none">↺ Restart</button>
  </div>

  <script>
  // ─────────────────────────────────────────────────────────────────────
  //  DATA
  // ─────────────────────────────────────────────────────────────────────

  var COMMON = [
    {
      node: 'client', dir: 'out',
      title: 'Request begins',
      what: 'The user clicks a button. The browser prepares to send a request but first needs to resolve the server name into a real network address.',
      fails: 'No network connection — the request never leaves the device.',
      time: 'No network time yet. This is all local.'
    },
    {
      node: 'dns', dir: 'out',
      title: 'DNS Lookup',
      what: 'The browser asks a DNS resolver to turn api.example.com into an IP address (e.g. 203.0.113.42). The result is cached, so most subsequent requests skip this step.',
      fails: 'A misconfigured record or unreachable resolver — the request fails before touching your system.',
      time: 'Near-zero if cached. A few milliseconds on a fresh lookup.'
    },
    {
      node: 'lb', dir: 'out',
      title: 'Load Balancer',
      what: 'The load balancer is the single public entry point. It accepts the connection and picks one healthy copy of your service to handle this request.',
      fails: 'Every service copy is unhealthy, or the load balancer itself is overwhelmed — all incoming requests stop here.',
      time: 'Sub-millisecond. Routing logic is fast.'
    },
    {
      node: 'gw', dir: 'out',
      title: 'API Gateway',
      what: 'The gateway checks every request before it reaches your service: it authenticates who is asking, enforces rate limits so one client cannot crowd out others, and routes the request to the right service.',
      fails: 'Unauthenticated requests are rejected. Rate-limited clients are turned away. These are intentional failures — exactly what the gateway is for.',
      time: '1–5 ms for auth checks and routing.'
    },
    {
      node: 'svc', dir: 'out',
      title: 'App Service',
      what: 'Business logic runs here. The service works out what data it needs to answer the request — for a profile page, that\'s the user\'s settings and account details.',
      fails: 'Unhandled exceptions or bugs cause a 500 error that travels back to the client.',
      time: 'Depends entirely on what the service finds in the next step.'
    },
    {
      node: 'cache', dir: 'out',
      title: 'Cache Check',
      what: 'Before touching the database, the service checks the cache — a fast in-memory store holding copies of recently fetched data. A hit here skips the slowest hop on the whole path.',
      fails: 'If the cache service is unreachable, the service must fall back to the database, or fail entirely if it cannot.',
      time: 'Under 1 ms for the lookup itself. What happens next decides the total.'
    }
  ];

  var HIT = [
    {
      node: 'cache', dir: 'in',
      title: 'Cache Hit',
      what: 'The data is in the cache. The service reads it from fast memory — no database call needed. This is the single biggest speedup available to a read-heavy system.',
      fails: 'Stale data: if the cached value is outdated, the client gets an old answer until the entry is refreshed or evicted.',
      time: 'Well under 1 ms — the fastest hop in the entire system.'
    },
    {
      node: 'client', dir: 'in',
      title: 'Response returns',
      what: 'The service assembles the response and sends it back through the API Gateway and Load Balancer. The client receives it and renders the page. Every hop you walked inward is also a hop on the way out.',
      fails: 'Network issues on the return path show up to the client as a hanging request or timeout.',
      time: 'Same network hops as the inbound path, plus ~1 ms to assemble the response.'
    }
  ];

  var MISS = [
    {
      node: 'cache', dir: 'out',
      title: 'Cache Miss',
      what: 'The data is not in the cache. The service must query the database. The lookup itself was fast, but the expensive hop is coming.',
      fails: 'If the database is also unavailable, the request fails entirely — there is no fallback.',
      time: 'Under 1 ms for the lookup. The database cost is next.'
    },
    {
      node: 'db', dir: 'out',
      title: 'Database Read',
      what: 'The service queries the database. Rows are fetched from disk and returned. Disk I/O and consistency checks make this the slowest internal hop on the path.',
      fails: 'The database can be overloaded (slow response), unreachable (timeout), or return unexpected data (consistency error).',
      time: 'A few to tens of milliseconds — the slowest hop inside your system.'
    },
    {
      node: 'cache', dir: 'in',
      title: 'Populate Cache',
      what: 'The service writes the fresh result back into the cache so the next identical request can skip the database entirely. This is how a cold cache warms up.',
      fails: 'A silent write failure leaves the cache cold — the next request will hit the database again.',
      time: 'Under 1 ms to write. Future reads now save tens of milliseconds each.'
    },
    {
      node: 'client', dir: 'in',
      title: 'Response returns',
      what: 'The service assembles the response and sends it back through the API Gateway and Load Balancer. The client receives it and renders the page. Every hop you walked inward is also a hop on the way out.',
      fails: 'Network issues on the return path show up to the client as a hanging request or timeout.',
      time: 'Same network hops as the inbound path, plus ~1 ms to assemble the response.'
    }
  ];

  var LATENCY = {
    hit:  { cls: 'hit',  icon: '⚡', text: 'Typical round trip: ~5–30 ms (cache hit — database skipped)' },
    miss: { cls: 'miss', icon: '🗄️', text: 'Typical round trip: ~20–200+ ms (cache miss — includes database read)' }
  };

  var NODES = ['client', 'dns', 'lb', 'gw', 'svc', 'cache', 'db'];

  // ─────────────────────────────────────────────────────────────────────
  //  STATE
  // ─────────────────────────────────────────────────────────────────────

  var idx  = 0;
  var path = null; // null | 'hit' | 'miss'

  function steps() {
    if (path === 'hit')  return COMMON.concat(HIT);
    if (path === 'miss') return COMMON.concat(MISS);
    return COMMON;
  }

  function isBranch() {
    return idx === COMMON.length - 1 && path === null;
  }

  function isLast() {
    return path !== null && idx === steps().length - 1;
  }

  // ─────────────────────────────────────────────────────────────────────
  //  RENDER
  // ─────────────────────────────────────────────────────────────────────

  function render() {
    var ss   = steps();
    var step = ss[idx];
    var br   = isBranch();
    var last = isLast();

    // Component highlighting
    var visitedNodes = ss.slice(0, idx).map(function(s) { return s.node; });
    NODES.forEach(function(n) {
      var el = document.getElementById('node-' + n);
      el.className = 'comp-node';
      if (n === step.node) {
        el.classList.add(step.dir === 'in' ? 'state-active-in' : 'state-active-out');
      } else if (visitedNodes.indexOf(n) !== -1) {
        el.classList.add('state-done');
      }
    });

    // Direction pill
    var pill = document.getElementById('direction-pill');
    var lbl  = document.getElementById('direction-label');
    if (step.dir === 'in') {
      pill.className = 'direction-pill in';
      lbl.textContent = '← Response travelling outbound';
    } else {
      pill.className = 'direction-pill out';
      lbl.textContent = '→ Request travelling inbound';
    }

    // Progress
    var total = path === null ? COMMON.length + 1 : ss.length;
    var pct   = Math.round(((idx + 1) / total) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('nav-counter').textContent =
      'Step ' + (idx + 1) + ' of ' + (path === null ? '?' : ss.length);

    // Step info
    document.getElementById('step-num').textContent = 'Step ' + (idx + 1);
    var tagEl = document.getElementById('step-dir-tag');
    tagEl.textContent  = step.dir === 'in' ? '← Response' : '→ Request';
    tagEl.className    = 'step-dir-tag ' + (step.dir === 'in' ? 'in' : 'out');
    document.getElementById('step-title').textContent  = step.title;
    document.getElementById('detail-what').textContent  = step.what;
    document.getElementById('detail-fails').textContent = step.fails;
    document.getElementById('detail-time').textContent  = step.time;

    // Branch section
    document.getElementById('branch-section').classList.toggle('visible', br);

    // Latency strip
    var strip = document.getElementById('latency-strip');
    if (last) {
      var lat = LATENCY[path];
      strip.className = 'latency-strip visible ' + lat.cls;
      document.getElementById('latency-icon').textContent = lat.icon;
      document.getElementById('latency-time').textContent = lat.text;
    } else {
      strip.className = 'latency-strip';
    }

    // Nav buttons
    document.getElementById('prev-btn').disabled = (idx === 0);
    var nextBtn    = document.getElementById('next-btn');
    var restartBtn = document.getElementById('restart-btn');
    nextBtn.disabled       = br || last;
    nextBtn.style.display    = last ? 'none' : '';
    restartBtn.style.display = last ? '' : 'none';

    // Scroll active node into view
    var activeEl = document.getElementById('node-' + step.node);
    if (activeEl) {
      activeEl.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }
  }

  // ─────────────────────────────────────────────────────────────────────
  //  ACTIONS
  // ─────────────────────────────────────────────────────────────────────

  function navigate(dir) {
    var ss      = steps();
    var newIdx  = idx + dir;
    if (newIdx < 0 || newIdx >= ss.length) return;

    // Going back past the branch resets path selection
    if (dir < 0 && path !== null && newIdx < COMMON.length) {
      path = null;
    }

    idx = newIdx;
    render();
  }

  function choosePath(chosen) {
    path = chosen;
    idx  = COMMON.length; // first step of chosen branch
    render();
  }

  function restart() {
    idx  = 0;
    path = null;
    render();
  }

  // Init
  render();
  </script>
</body>
</html>
