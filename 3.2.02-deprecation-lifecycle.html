<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Deprecation Lifecycle</title>
  <style>
    @font-face {
      font-family: 'Suisse Intl';
      src: url('https://d2jcw3k6onjdla.cloudfront.net/fonts/suisse/SuisseIntl-Regular-WebM.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Suisse Intl Mono';
      src: url('https://d2jcw3k6onjdla.cloudfront.net/fonts/suisse/SuisseIntlMono-Regular-WebS.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Suisse Intl', system-ui, -apple-system, sans-serif;
      font-size: 18px;
      color: #1A1A1A;
      background: #FFFFFF;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 700px;
    }

    /* ─── Hint header ─── */
    .hint-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(0,0,0,0.14);
    }

    .hint-cursor {
      flex-shrink: 0;
      animation: cursor-wiggle 4s infinite;
    }

    @keyframes cursor-wiggle {
      0%,100% { transform: rotate(0deg); }
      14%     { transform: rotate(-10deg); }
      28%     { transform: rotate(10deg); }
      42%     { transform: rotate(-8deg); }
      56%     { transform: rotate(6deg); }
      70%     { transform: rotate(-3deg); }
      84%     { transform: rotate(0deg); }
    }

    .hint-text {
      font-size: 18px;
      color: #1A1A1A;
    }

    /* ─── Main body ─── */
    .main {
      padding: 24px;
    }

    /* ─── Timeline strip ─── */
    .timeline-wrap {
      position: relative;
      margin-bottom: 28px;
    }

    .timeline-track {
      position: absolute;
      top: 14px;
      left: 20px;
      right: 20px;
      height: 2px;
      background: rgba(0,0,0,0.10);
      z-index: 0;
    }

    .timeline-progress {
      height: 100%;
      background: #328F51;
      transition: width 0.5s ease;
    }

    .milestones {
      display: flex;
      position: relative;
      z-index: 1;
    }

    .milestone {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .ms-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.12);
      background: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 12px;
      color: rgba(0,0,0,0.40);
      transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
    }

    .ms-dot.done {
      background: #328F51;
      border-color: #328F51;
      color: #FFFFFF;
    }

    .ms-dot.current {
      background: #1878DC;
      border-color: #1878DC;
      color: #FFFFFF;
    }

    .ms-label {
      font-size: 12px;
      text-align: center;
      color: rgba(0,0,0,0.35);
      line-height: 1.3;
      transition: color 0.3s ease;
    }

    .ms-label.done    { color: #328F51; }
    .ms-label.current { color: #1878DC; font-weight: 600; }

    /* ─── Stage card ─── */
    .stage-card {
      background: #F2F1EE;
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 24px;
      min-height: 140px;
    }

    .stage-eyebrow {
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 14px;
      color: rgba(0,0,0,0.45);
      margin-bottom: 6px;
    }

    .stage-title {
      font-size: 20px;
      font-weight: 600;
      color: #1A1A1A;
      margin-bottom: 10px;
    }

    .stage-body {
      font-size: 16px;
      color: rgba(0,0,0,0.68);
      line-height: 1.55;
    }

    .badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 13px;
      font-family: 'Suisse Intl Mono', monospace;
    }

    .badge.red    { background: rgba(222,76,69,0.10);  color: #DE4C45; }
    .badge.green  { background: rgba(50,143,81,0.10);  color: #328F51; }
    .badge.yellow { background: rgba(244,142,0,0.10);  color: #F48E00; }
    .badge.blue   { background: rgba(24,120,220,0.10); color: #1878DC; }

    /* ─── Traffic bars ─── */
    .traffic-section {
      margin-bottom: 24px;
    }

    .traffic-heading {
      font-size: 14px;
      color: rgba(0,0,0,0.45);
      margin-bottom: 12px;
      font-family: 'Suisse Intl Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .version-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .vtag {
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 14px;
      padding: 4px 10px;
      border-radius: 6px;
      min-width: 36px;
      text-align: center;
      flex-shrink: 0;
    }

    .vtag.v1 { background: rgba(222,76,69,0.10); color: #DE4C45; }
    .vtag.v2 { background: rgba(50,143,81,0.10);  color: #328F51; }
    .vtag.v1.gone { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.25); }

    .bar-track {
      flex: 1;
      height: 20px;
      background: rgba(0,0,0,0.06);
      border-radius: 6px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .bar-fill.v1 { background: #DE4C45; }
    .bar-fill.v2 { background: #328F51; }
    .bar-fill.gone { background: rgba(0,0,0,0.10); }

    .bar-pct {
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 14px;
      color: rgba(0,0,0,0.45);
      min-width: 40px;
      text-align: right;
    }

    /* ─── Insight callout ─── */
    .insight {
      display: flex;
      gap: 12px;
      padding: 14px 16px;
      background: rgba(24,120,220,0.06);
      border-left: 3px solid #1878DC;
      border-radius: 0 8px 8px 0;
      margin-bottom: 28px;
      font-size: 16px;
      line-height: 1.55;
      color: rgba(0,0,0,0.70);
    }

    .insight-icon {
      flex-shrink: 0;
      font-size: 18px;
      margin-top: 1px;
    }

    /* ─── Nav ─── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .step-counter {
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 14px;
      color: rgba(0,0,0,0.40);
    }

    .nav-buttons {
      display: flex;
      gap: 10px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-family: 'Suisse Intl', system-ui, sans-serif;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
      box-shadow: 0 0 0.5px 0 rgba(0,0,0,0.30), 0 1px 3px 0 rgba(0,0,0,0.15);
    }

    .nav-btn.prev {
      background: #F2F1EE;
      color: #1A1A1A;
    }

    .nav-btn.next {
      background: #1878DC;
      color: #FFFFFF;
    }

    .nav-btn.done-btn {
      background: #328F51;
      color: #FFFFFF;
    }

    .nav-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 0 0.5px 0 rgba(0,0,0,0.30), 0 3px 8px 0 rgba(0,0,0,0.20);
    }

    .nav-btn:active:not(:disabled) {
      transform: translateY(0px);
    }

    .nav-btn:disabled {
      opacity: 0.30;
      cursor: not-allowed;
    }

    /* ─── Responsive ─── */
    @media (max-width: 480px) {
      .hint-header, .main { padding: 16px; }
      .stage-card { padding: 16px; }
      .ms-label { font-size: 10px; }
      .stage-title { font-size: 18px; }
    }

    @media (max-width: 360px) {
      .ms-label { display: none; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Hint header -->
  <div class="hint-header">
    <svg class="hint-cursor" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M9 3.5V2M5.06066 5.06066L4 4M5.06066 13L4 14.0607M13 5.06066L14.0607 4M3.5 9H2M15.8645 16.1896L13.3727 20.817C13.0881 21.3457 12.9457 21.61 12.7745 21.6769C12.6259 21.7349 12.4585 21.7185 12.324 21.6328C12.1689 21.534 12.0806 21.2471 11.9038 20.6733L8.44519 9.44525C8.3008 8.97651 8.2286 8.74213 8.28669 8.58383C8.33729 8.44595 8.44595 8.33729 8.58383 8.2867C8.74213 8.22861 8.9765 8.3008 9.44525 8.44519L20.6732 11.9038C21.247 12.0806 21.5339 12.169 21.6327 12.324C21.7185 12.4586 21.7348 12.6259 21.6768 12.7745C21.61 12.9458 21.3456 13.0881 20.817 13.3728L16.1896 15.8645C16.111 15.9068 16.0717 15.9279 16.0374 15.9551C16.0068 15.9792 15.9792 16.0068 15.9551 16.0374C15.9279 16.0717 15.9068 16.111 15.8645 16.1896Z" stroke="black" stroke-opacity="0.83" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="hint-text">Click Next to step through the five stages of a healthy API deprecation.</span>
  </div>

  <div class="main">

    <!-- Timeline strip -->
    <div class="timeline-wrap" id="timelineWrap">
      <div class="timeline-track">
        <div class="timeline-progress" id="timelineProgress"></div>
      </div>
      <div class="milestones" id="milestones"></div>
    </div>

    <!-- Stage card -->
    <div class="stage-card" id="stageCard"></div>

    <!-- Traffic bars -->
    <div class="traffic-section">
      <div class="traffic-heading">API traffic</div>
      <div class="version-row">
        <span class="vtag v1" id="v1Tag">v1</span>
        <div class="bar-track">
          <div class="bar-fill v1" id="v1Bar"></div>
        </div>
        <span class="bar-pct" id="v1Pct"></span>
      </div>
      <div class="version-row">
        <span class="vtag v2" id="v2Tag">v2</span>
        <div class="bar-track">
          <div class="bar-fill v2" id="v2Bar"></div>
        </div>
        <span class="bar-pct" id="v2Pct"></span>
      </div>
    </div>

    <!-- Insight -->
    <div class="insight" id="insight">
      <span class="insight-icon">💡</span>
      <span id="insightText"></span>
    </div>

    <!-- Nav -->
    <div class="nav">
      <span class="step-counter" id="stepCounter"></span>
      <div class="nav-buttons">
        <button class="nav-btn prev" id="prevBtn" onclick="go(-1)">← Back</button>
        <button class="nav-btn next" id="nextBtn" onclick="go(1)">Next →</button>
      </div>
    </div>

  </div>
</div>

<script>
  const MILESTONE_LABELS = ['Announce', 'Dual support', 'Migration', 'Confirm', 'Sunset'];

  const STAGES = [
    {
      eyebrow: 'Stage 1 of 5',
      title: 'Announce v2',
      body: 'You publish v2 with a clear changelog explaining exactly what changed and why. Every consumer learns about the new version and the migration path before anyone is asked to move.',
      badges: [
        { label: 'v2 launched', cls: 'blue' },
        { label: 'v1 still active', cls: 'green' }
      ],
      v1: 100, v2: 0,
      v1Strikethrough: false,
      insight: 'A changelog that names every breaking change and explains the reason is the starting point. Consumers need to know what changed and why — not just that a new version exists.'
    },
    {
      eyebrow: 'Stage 2 of 5',
      title: 'Run both versions in parallel',
      body: 'v1 and v2 are live at the same time. Consumers can begin migrating at their own pace. No one is broken because the old version is still fully supported.',
      badges: [
        { label: 'v1 deprecated', cls: 'yellow' },
        { label: 'v2 active', cls: 'green' }
      ],
      v1: 80, v2: 20,
      v1Strikethrough: false,
      insight: 'Deprecation notices begin appearing on v1 — in response headers, docs, and status pages. Consumers see that v1 has an end date, but no one is broken yet. Each team migrates on its own schedule.'
    },
    {
      eyebrow: 'Stage 3 of 5',
      title: 'Actively help consumers migrate',
      body: 'You reach out directly to every team still on v1, share worked examples, and answer questions. Traffic shifts as consumers move on their own schedule — not yours.',
      badges: [
        { label: 'v1 deprecated', cls: 'yellow' },
        { label: 'migration in progress', cls: 'blue' }
      ],
      v1: 50, v2: 50,
      v1Strikethrough: false,
      insight: 'Docs alone are not enough. Active outreach is the difference between a migration that completes and one that stalls. Contact the teams on v1, find out what is blocking them, and unblock it.'
    },
    {
      eyebrow: 'Stage 4 of 5',
      title: 'Confirm v1 traffic is near zero',
      body: 'You check the actual traffic numbers before making any decision. Only when v1 traffic is close to zero — not just "low" — do you begin the final countdown to shutdown.',
      badges: [
        { label: 'v1 nearly empty', cls: 'red' },
        { label: 'v2 dominant', cls: 'green' }
      ],
      v1: 5, v2: 95,
      v1Strikethrough: false,
      insight: 'Never guess. One team still on v1 is enough to delay the sunset. Find out who they are and help them cross before you pull the plug. Metrics decide — not assumptions.'
    },
    {
      eyebrow: 'Stage 5 of 5',
      title: 'Sunset v1',
      body: 'v1 is removed. All traffic is on v2. The old code, tests, and documentation are retired. Your team now maintains only one version of this behavior.',
      badges: [
        { label: 'v1 removed', cls: 'red' },
        { label: 'v2 is the only version', cls: 'green' }
      ],
      v1: 0, v2: 100,
      v1Strikethrough: true,
      insight: 'The version number marked the change. The deprecation process carried your consumers across it. These two things together — a new version and a managed lifecycle — are what versioning actually means.'
    }
  ];

  let step = 0;

  function renderMilestones() {
    const wrap = document.getElementById('milestones');
    wrap.innerHTML = MILESTONE_LABELS.map((label, i) => {
      const isDone    = i < step;
      const isCurrent = i === step;
      const dotCls    = 'ms-dot' + (isDone ? ' done' : isCurrent ? ' current' : '');
      const lblCls    = 'ms-label' + (isDone ? ' done' : isCurrent ? ' current' : '');
      const icon      = isDone ? '✓' : String(i + 1);
      return `<div class="milestone">
        <div class="${dotCls}">${icon}</div>
        <div class="${lblCls}">${label}</div>
      </div>`;
    }).join('');

    // progress bar: fills between dots that are done
    const pct = step === 0 ? 0 : (step / (MILESTONE_LABELS.length - 1)) * 100;
    document.getElementById('timelineProgress').style.width = pct + '%';
  }

  function renderStage() {
    const s = STAGES[step];

    // Stage card
    const badgesHtml = s.badges.map(b =>
      `<span class="badge ${b.cls}">${b.label}</span>`
    ).join('');
    document.getElementById('stageCard').innerHTML = `
      <div class="stage-eyebrow">${s.eyebrow}</div>
      <div class="stage-title">${s.title}</div>
      <div class="stage-body">${s.body}</div>
      <div class="badges">${badgesHtml}</div>
    `;

    // v1 bar
    document.getElementById('v1Bar').style.width  = s.v1 + '%';
    document.getElementById('v1Bar').className    = 'bar-fill ' + (s.v1Strikethrough ? 'gone' : 'v1');
    document.getElementById('v1Tag').className    = 'vtag v1' + (s.v1Strikethrough ? ' gone' : '');
    document.getElementById('v1Pct').textContent  = s.v1 + '%';

    // v2 bar
    document.getElementById('v2Bar').style.width = s.v2 + '%';
    document.getElementById('v2Pct').textContent = s.v2 + '%';

    // Insight
    document.getElementById('insightText').textContent = s.insight;

    // Counter
    document.getElementById('stepCounter').textContent = `${step + 1} / ${STAGES.length}`;

    // Buttons
    document.getElementById('prevBtn').disabled = step === 0;
    const nextBtn = document.getElementById('nextBtn');
    if (step === STAGES.length - 1) {
      nextBtn.textContent = 'Start over';
      nextBtn.className = 'nav-btn done-btn';
    } else {
      nextBtn.textContent = 'Next →';
      nextBtn.className = 'nav-btn next';
      nextBtn.disabled = false;
    }
  }

  function go(dir) {
    if (dir === 1 && step === STAGES.length - 1) {
      step = 0;
    } else {
      step = Math.max(0, Math.min(STAGES.length - 1, step + dir));
    }
    renderMilestones();
    renderStage();
  }

  // Initial render
  renderMilestones();
  renderStage();
</script>
</body>
</html>
