<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mock vs Integration: What Actually Runs?</title>
  <style>
    @font-face {
      font-family: 'Suisse Intl';
      src: url('https://d2jcw3k6onjdla.cloudfront.net/fonts/suisse/SuisseIntl-Regular-WebM.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Suisse Intl Mono';
      src: url('https://d2jcw3k6onjdla.cloudfront.net/fonts/suisse/SuisseIntlMono-Regular-WebS.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Suisse Intl', system-ui, -apple-system, sans-serif;
      font-size: 18px;
      color: #1A1A1A;
      background: #FFFFFF;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 700px;
    }

    /* ── Hint header ── */
    .hint-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(0,0,0,0.14);
    }

    .cursor-icon {
      flex-shrink: 0;
      animation: cursor-wiggle 4s infinite;
    }

    @keyframes cursor-wiggle {
      0%   { transform: rotate(0deg); }
      15%  { transform: rotate(-10deg); }
      30%  { transform: rotate(10deg); }
      45%  { transform: rotate(-8deg); }
      60%  { transform: rotate(6deg); }
      75%  { transform: rotate(-3deg); }
      100% { transform: rotate(0deg); }
    }

    .hint-text {
      font-size: 18px;
      line-height: 1.4;
    }

    /* ── Progress pips ── */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 20px 20px 0;
    }

    .pip {
      height: 8px;
      border-radius: 4px;
      background: rgba(0,0,0,0.14);
      transition: background 0.25s, width 0.25s;
      cursor: pointer;
      width: 8px;
    }

    .pip.active {
      background: #1878DC;
      width: 20px;
    }

    .pip-label {
      font-size: 14px;
      font-family: 'Suisse Intl Mono', monospace;
      color: rgba(0,0,0,0.45);
      margin-left: 4px;
    }

    /* ── Step card ── */
    .step-card {
      padding: 20px 20px 0;
    }

    .step-heading {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .step-scenario {
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 12px;
      color: rgba(0,0,0,0.50);
      background: #F2F1EE;
      padding: 6px 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      display: block;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* ── Two-column comparison ── */
    .comparison {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 500px) {
      .comparison { grid-template-columns: 1fr; }
    }

    .col {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .col-label {
      font-size: 12px;
      font-family: 'Suisse Intl Mono', monospace;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-align: center;
      padding: 6px 12px;
      border-radius: 6px;
    }

    .col-label.mock-label {
      background: rgba(0,0,0,0.05);
      color: rgba(0,0,0,0.45);
    }

    .col-label.real-label {
      background: rgba(50,143,81,0.10);
      color: #2a7a45;
    }

    .test-card {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 0.5px 0 rgba(0,0,0,0.30), 0 1px 3px 0 rgba(0,0,0,0.15);
      flex: 1;
    }

    .test-card.mock-card { border: 1.5px solid rgba(0,0,0,0.12); }
    .test-card.real-card { border: 1.5px solid rgba(50,143,81,0.30); }

    /* Code area */
    .code-area {
      padding: 12px;
      background: #F2F1EE;
    }

    .area-label {
      font-size: 11px;
      font-family: 'Suisse Intl Mono', monospace;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.35);
      margin-bottom: 6px;
    }

    pre.code-snippet {
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 12px;
      line-height: 1.65;
      color: #1A1A1A;
      white-space: pre-wrap;
      word-break: break-word;
    }

    pre.code-snippet .cmt {
      color: rgba(0,0,0,0.40);
    }

    /* Result area */
    .result-area {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .db-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .db-icon-wrap {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .db-icon-wrap.db-on  { background: rgba(50,143,81,0.12); }
    .db-icon-wrap.db-off { background: rgba(0,0,0,0.05); }

    .db-status {
      font-size: 13px;
      font-family: 'Suisse Intl Mono', monospace;
      line-height: 1.4;
    }

    .db-status.db-on  { color: #2a7a45; }
    .db-status.db-off { color: rgba(0,0,0,0.35); }

    /* Outcome tag */
    .outcome-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-family: 'Suisse Intl Mono', monospace;
      align-self: flex-start;
    }

    .tag-hollow { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.50); }
    .tag-pass   { background: rgba(50,143,81,0.12); color: #2a7a45; }
    .tag-caught { background: rgba(24,120,220,0.10); color: #1878DC; }
    .tag-miss   { background: rgba(222,76,69,0.10); color: #DE4C45; }

    .explain-text {
      font-size: 14px;
      color: rgba(0,0,0,0.55);
      line-height: 1.55;
    }

    /* Insight bar */
    .insight-bar {
      margin-top: 16px;
      padding: 12px 16px;
      background: #F2F1EE;
      border-left: 3px solid #1878DC;
      border-radius: 0 8px 8px 0;
      font-size: 16px;
      line-height: 1.5;
      color: #1A1A1A;
    }

    .insight-bar strong { color: #1878DC; }

    /* Nav */
    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 20px 24px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      border-radius: 8px;
      font-family: 'Suisse Intl', system-ui, sans-serif;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, opacity 0.15s;
      border: 1.5px solid rgba(0,0,0,0.14);
      background: #FFFFFF;
      color: #1A1A1A;
    }

    .btn:hover:not(:disabled) {
      background: #F2F1EE;
      border-color: rgba(0,0,0,0.25);
    }

    .btn:disabled { opacity: 0.28; cursor: default; }

    .btn.primary {
      background: #1878DC;
      border-color: #1878DC;
      color: #FFFFFF;
    }

    .btn.primary:hover:not(:disabled) {
      background: #1469c8;
      border-color: #1469c8;
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Hint header -->
  <div class="hint-header">
    <svg class="cursor-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M9 3.5V2M5.06066 5.06066L4 4M5.06066 13L4 14.0607M13 5.06066L14.0607 4M3.5 9H2M15.8645 16.1896L13.3727 20.817C13.0881 21.3457 12.9457 21.61 12.7745 21.6769C12.6259 21.7349 12.4585 21.7185 12.324 21.6328C12.1689 21.534 12.0806 21.2471 11.9038 20.6733L8.44519 9.44525C8.3008 8.97651 8.2286 8.74213 8.28669 8.58383C8.33729 8.44595 8.44595 8.33729 8.58383 8.2867C8.74213 8.22861 8.9765 8.3008 9.44525 8.44519L20.6732 11.9038C21.247 12.0806 21.5339 12.169 21.6327 12.324C21.7185 12.4586 21.7348 12.6259 21.6768 12.7745C21.61 12.9458 21.3456 13.0881 20.817 13.3728L16.1896 15.8645C16.111 15.9068 16.0717 15.9279 16.0374 15.9551C16.0068 15.9792 15.9792 16.0068 15.9551 16.0374C15.9279 16.0717 15.9068 16.111 15.8645 16.1896Z" stroke="black" stroke-opacity="0.83" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="hint-text">Step through each test phase — see what a mock runs vs. what actually executes.</span>
  </div>

  <!-- Progress pips -->
  <div class="progress-row">
    <div class="pip active" id="pip-0" onclick="goTo(0)" title="Phase 1"></div>
    <div class="pip" id="pip-1" onclick="goTo(1)" title="Phase 2"></div>
    <div class="pip" id="pip-2" onclick="goTo(2)" title="Phase 3"></div>
    <span class="pip-label" id="pip-label">1 / 3</span>
  </div>

  <!-- Step card (rendered by JS) -->
  <div class="step-card" id="step-card"></div>

  <!-- Navigation -->
  <div class="nav-row">
    <button class="btn" id="btn-prev" onclick="goStep(-1)" disabled>&#8592; Back</button>
    <button class="btn primary" id="btn-next" onclick="goStep(1)">Next &#8594;</button>
  </div>

</div>
<script>
/* ------------------------------------------------------------------ data */
var STEPS = [
  {
    heading: "Phase 1 — Saving a Record",
    scenario: 'repo.save(User(email="ada@example.com", display_name="Ada"))',
    mock: {
      code: [
        'mock_repo.save(user)',
        '# → returns MagicMock(id=1)',
        '# → no SQL executed',
        '# → database not touched'
      ],
      dbOn: false,
      dbText: "Database not touched",
      tag: "hollow",
      tagText: "○  passes — nothing ran",
      explain: "The mock returns a scripted fake object immediately. No INSERT runs. The database is never involved at any point."
    },
    real: {
      code: [
        'repo.save(user)',
        '# → executes SQL:',
        '#   INSERT INTO users',
        '#   (email, display_name)',
        '#   VALUES (...)',
        '# → Postgres assigns id = 1'
      ],
      dbOn: true,
      dbText: "Real INSERT executed",
      tag: "pass",
      tagText: "✓  real row written to db",
      explain: "A real INSERT runs against Dockerized Postgres. The database assigns an auto-generated ID and durably persists the row."
    },
    insight: "Both tests 'pass' here — but only the integration test actually wrote a row to a database."
  },
  {
    heading: "Phase 2 — Reading it Back",
    scenario: 'repo.get_by_id(saved.id)',
    mock: {
      code: [
        'mock_repo.get_by_id(1)',
        '# → returns scripted MagicMock',
        '#   (email="ada@example.com")',
        '# → no SELECT ran',
        '# → save() never had to work'
      ],
      dbOn: false,
      dbText: "Database not touched",
      tag: "hollow",
      tagText: "○  returns scripted value",
      explain: "The mock returns exactly the value you told it to. A completely broken save() would still make this test pass — the mock cannot tell the difference."
    },
    real: {
      code: [
        'repo.get_by_id(saved.id)',
        '# → executes SQL:',
        '#   SELECT * FROM users',
        '#   WHERE id = 1',
        '# → returns real row from disk'
      ],
      dbOn: true,
      dbText: "Real SELECT verified",
      tag: "pass",
      tagText: "✓  confirms save() worked",
      explain: "A real SELECT runs. If save() had silently failed, get_by_id() returns None and the assertion fails — catching a real production bug."
    },
    insight: "The mock read-back tests the mock, not the database. Only the integration test can detect a broken save()."
  },
  {
    heading: "Phase 3 — Enforcing a Constraint",
    scenario: 'repo.save(User(email="ada@example.com", ...))  ← duplicate email!',
    mock: {
      code: [
        'mock_repo.save(duplicate)',
        '# → returns MagicMock(id=2)',
        '# → IntegrityError? Never raised.',
        '# → constraint silently ignored',
        '# → bug ships to production'
      ],
      dbOn: false,
      dbText: "Constraint never checked",
      tag: "miss",
      tagText: "✕  constraint bug not caught",
      explain: "The mock has no knowledge of your unique constraint. It happily returns success for the duplicate. The constraint is never proven to work."
    },
    real: {
      code: [
        'repo.save(duplicate)',
        '# → Postgres enforces UNIQUE',
        '#   constraint on email:',
        '# IntegrityError: duplicate key',
        '#  violates "users_email_key"'
      ],
      dbOn: true,
      dbText: "Constraint enforced",
      tag: "caught",
      tagText: "⚑  IntegrityError raised",
      explain: "Postgres enforces its unique index on email. The IntegrityError bubbles up, your test wraps it in pytest.raises — constraint proven to work."
    },
    insight: "This is the exact bug a mock can never find. The constraint only fires when real SQL runs against a real database engine."
  }
];

/* ---------------------------------------------------------------- helpers */
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function dbSvg(on) {
  var c = on ? '#2a7a45' : 'rgba(0,0,0,0.25)';
  return '<svg width="18" height="18" viewBox="0 0 20 18" fill="none" xmlns="http://www.w3.org/2000/svg">'
    + '<ellipse cx="10" cy="4" rx="7" ry="2.4" stroke="' + c + '" stroke-width="1.5"/>'
    + '<path d="M3 4v5c0 1.33 3.13 2.4 7 2.4s7-1.07 7-2.4V4" stroke="' + c + '" stroke-width="1.5"/>'
    + '<path d="M3 9v5c0 1.33 3.13 2.4 7 2.4s7-1.07 7-2.4V9" stroke="' + c + '" stroke-width="1.5"/>'
    + '</svg>';
}

function buildSide(side, type) {
  var codeHtml = side.code.map(function(line) {
    var e = esc(line);
    return line.charAt(0) === '#' ? '<span class="cmt">' + e + '</span>' : e;
  }).join('\n');

  return '<div class="col">'
    + '<div class="col-label ' + type + '-label">' + (type === 'mock' ? 'Mock-based test' : 'Integration test') + '</div>'
    + '<div class="test-card ' + type + '-card">'
      + '<div class="code-area">'
        + '<div class="area-label">what executes</div>'
        + '<pre class="code-snippet">' + codeHtml + '</pre>'
      + '</div>'
      + '<div class="result-area">'
        + '<div class="db-row">'
          + '<div class="db-icon-wrap ' + (side.dbOn ? 'db-on' : 'db-off') + '">' + dbSvg(side.dbOn) + '</div>'
          + '<span class="db-status ' + (side.dbOn ? 'db-on' : 'db-off') + '">' + esc(side.dbText) + '</span>'
        + '</div>'
        + '<div class="outcome-tag tag-' + side.tag + '">' + esc(side.tagText) + '</div>'
        + '<div class="explain-text">' + esc(side.explain) + '</div>'
      + '</div>'
    + '</div>'
  + '</div>';
}

/* ----------------------------------------------------------------- render */
var current = 0;

function render() {
  var s = STEPS[current];

  document.getElementById('step-card').innerHTML =
      '<div class="step-heading">' + esc(s.heading) + '</div>'
    + '<code class="step-scenario">' + esc(s.scenario) + '</code>'
    + '<div class="comparison">'
      + buildSide(s.mock, 'mock')
      + buildSide(s.real, 'real')
    + '</div>'
    + '<div class="insight-bar"><strong>Key insight:</strong> ' + esc(s.insight) + '</div>';

  for (var i = 0; i < 3; i++) {
    var p = document.getElementById('pip-' + i);
    p.className = 'pip' + (i === current ? ' active' : '');
  }
  document.getElementById('pip-label').textContent = (current + 1) + ' / 3';
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').textContent =
    current === 2 ? '↺ Start over' : 'Next →';
}

function goStep(d) {
  if (d === 1 && current === 2) { current = 0; }
  else { current = Math.max(0, Math.min(2, current + d)); }
  render();
}

function goTo(i) { current = i; render(); }

render();
</script>
</body>
</html>
