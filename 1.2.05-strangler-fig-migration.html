<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strangler Fig Migration</title>
  <style>
    @font-face {
      font-family: 'Suisse Intl';
      src: url('https://d2jcw3k6onjdla.cloudfront.net/fonts/suisse/SuisseIntl-Regular-WebM.woff2') format('woff2');
      font-weight: 400; font-style: normal;
    }
    @font-face {
      font-family: 'Suisse Intl Mono';
      src: url('https://d2jcw3k6onjdla.cloudfront.net/fonts/suisse/SuisseIntlMono-Regular-WebS.woff2') format('woff2');
      font-weight: 400; font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Suisse Intl', system-ui, -apple-system, sans-serif;
      font-size: 18px;
      color: #1A1A1A;
      background: #fff;
    }

    .wrap {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
    }

    /* ── Hint header ─────────────────────────── */
    .hint {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 24px 24px 16px;
      font-size: 18px;
      color: #1A1A1A;
    }
    .hint svg {
      flex-shrink: 0;
      animation: wiggle 4s ease-in-out infinite;
    }
    @keyframes wiggle {
      0%   { transform: rotate(0deg);   }
      8%   { transform: rotate(-10deg); }
      18%  { transform: rotate(10deg);  }
      28%  { transform: rotate(-8deg);  }
      38%  { transform: rotate(6deg);   }
      48%  { transform: rotate(-3deg);  }
      55%  { transform: rotate(0deg);   }
      100% { transform: rotate(0deg);   }
    }

    /* ── Progress dots ───────────────────────── */
    .dots {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 24px 20px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(0,0,0,0.14);
      transition: background 0.25s ease;
    }
    .dot.on { background: #1878DC; }
    .step-lbl {
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 14px;
      color: rgba(0,0,0,0.50);
      margin-left: 4px;
    }

    /* ── Card ────────────────────────────────── */
    .card {
      margin: 0 24px;
      border: 1px solid rgba(0,0,0,0.14);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 0.5px 0 rgba(0,0,0,0.30), 0 1px 3px 0 rgba(0,0,0,0.15);
    }

    .card-head {
      background: #F2F1EE;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(0,0,0,0.10);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-height: 52px;
    }
    .card-head-title {
      font-size: 16px;
      font-weight: 600;
      color: #1A1A1A;
    }

    .pill {
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      line-height: 1;
    }
    .pill-orange { background: rgba(244,142,0,0.15);  color: #F48E00; }
    .pill-purple { background: rgba(135,84,253,0.15); color: #8754FD; }
    .pill-green  { background: rgba(50,143,81,0.15);  color: #328F51; }

    /* ── Architecture diagram ────────────────── */
    .diagram {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: nowrap;
      gap: 12px;
      padding: 28px 24px 24px;
      min-height: 164px;
    }

    .arch-box {
      border: 1.5px solid rgba(0,0,0,0.18);
      border-radius: 12px;
      padding: 12px 16px;
      min-width: 144px;
      background: #fff;
      box-shadow: 0 0 0.5px 0 rgba(0,0,0,0.30), 0 1px 3px 0 rgba(0,0,0,0.15);
    }
    .arch-box.b-purple { border-color: #8754FD; }
    .arch-box.b-green  { border-color: #328F51; }

    .box-lbl {
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 11px;
      color: rgba(0,0,0,0.38);
      text-transform: uppercase;
      letter-spacing: 0.055em;
      margin-bottom: 10px;
      text-align: center;
    }

    .mod {
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 14px;
      text-align: center;
      margin: 3px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      white-space: nowrap;
    }
    .mod-a  { background: rgba(24,120,220,0.10); color: #1878DC; border: 1px solid rgba(24,120,220,0.20); }
    .mod-b  { background: rgba(50,143,81,0.10);  color: #328F51; border: 1px solid rgba(50,143,81,0.20); }
    .mod-p  { background: rgba(135,84,253,0.12); color: #8754FD; border: 1px solid rgba(135,84,253,0.20); }
    .mod-pg { background: rgba(50,143,81,0.12);  color: #328F51; border: 1px solid rgba(50,143,81,0.20); }

    .mod.dim      { opacity: 0.28; text-decoration: line-through; }
    .mod.pressure { border-style: dashed; }

    .tag {
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .tag-o { background: rgba(244,142,0,0.18);  color: #F48E00; }
    .tag-p { background: rgba(135,84,253,0.18); color: #8754FD; }
    .tag-g { background: rgba(50,143,81,0.18);  color: #328F51; }

    /* Arrow connector */
    .arr {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .arr-row {
      display: flex;
      align-items: center;
    }
    .arr-shaft { height: 2px; width: 40px; }
    .arr-head  {
      width: 0; height: 0;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
    }
    .arr-txt {
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 11px;
      color: rgba(0,0,0,0.38);
      white-space: nowrap;
    }

    /* Narrow: stack vertically, swap to down arrow */
    .arr-dn      { display: none; font-size: 18px; line-height: 1; color: rgba(0,0,0,0.28); }
    .arr-dn-txt  { display: none; font-family: 'Suisse Intl Mono', monospace; font-size: 11px; color: rgba(0,0,0,0.38); text-align: center; }

    /* ── Description ─────────────────────────── */
    .desc {
      padding: 16px 20px 20px;
      border-top: 1px solid rgba(0,0,0,0.08);
      font-size: 16px;
      line-height: 1.62;
      color: #1A1A1A;
    }

    /* ── Navigation ──────────────────────────── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px 28px;
    }
    .btn {
      font-family: 'Suisse Intl', system-ui, sans-serif;
      font-size: 16px;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s ease, transform 0.10s ease;
    }
    .btn:hover:not(:disabled)  { opacity: 0.78; transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: none; }
    .btn:disabled { cursor: not-allowed; opacity: 0.35; transform: none; }
    .btn-dark  { background: #1A1A1A; color: #fff; }
    .btn-ghost { background: transparent; color: #1A1A1A; border: 1px solid rgba(0,0,0,0.20); }

    /* Fade-in animation on step change */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0);   }
    }
    .fade { animation: fadeUp 0.28s ease both; }

    /* ── Responsive ──────────────────────────── */
    @media (max-width: 520px) {
      .hint   { padding: 16px 16px 12px; font-size: 16px; }
      .dots   { padding: 0 16px 16px; }
      .card   { margin: 0 16px; }
      .nav    { padding: 12px 16px 24px; }
      .diagram { padding: 20px 12px 20px; gap: 8px; }
      .arr-shaft { width: 24px; }
    }

    @media (max-width: 400px) {
      .diagram {
        flex-direction: column;
        align-items: center;
        gap: 0;
        padding: 20px 16px;
      }
      .arr-row  { display: none; }
      .arr      { flex-direction: row; align-items: center; gap: 6px; margin: 6px 0; }
      .arr-dn   { display: block; }
      .arr-txt  { display: none; }
      .arr-dn-txt { display: block; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Hint header -->
  <div class="hint">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M9 3.5V2M5.06066 5.06066L4 4M5.06066 13L4 14.0607M13 5.06066L14.0607 4M3.5 9H2M15.8645 16.1896L13.3727 20.817C13.0881 21.3457 12.9457 21.61 12.7745 21.6769C12.6259 21.7349 12.4585 21.7185 12.324 21.6328C12.1689 21.534 12.0806 21.2471 11.9038 20.6733L8.44519 9.44525C8.3008 8.97651 8.2286 8.74213 8.28669 8.58383C8.33729 8.44595 8.44595 8.33729 8.58383 8.2867C8.74213 8.22861 8.9765 8.3008 9.44525 8.44519L20.6732 11.9038C21.247 12.0806 21.5339 12.169 21.6327 12.324C21.7185 12.4586 21.7348 12.6259 21.6768 12.7745C21.61 12.9458 21.3456 13.0881 20.817 13.3728L16.1896 15.8645C16.111 15.9068 16.0717 15.9279 16.0374 15.9551C16.0068 15.9792 15.9792 16.0068 15.9551 16.0374C15.9279 16.0717 15.9068 16.111 15.8645 16.1896Z" stroke="black" stroke-opacity="0.83" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Step through a service extraction
  </div>

  <!-- Progress dots -->
  <div class="dots">
    <div class="dot on" id="d0"></div>
    <div class="dot"    id="d1"></div>
    <div class="dot"    id="d2"></div>
    <div class="dot"    id="d3"></div>
    <span class="step-lbl" id="slbl">Step 1 of 4</span>
  </div>

  <!-- Card (rendered by JS) -->
  <div class="card" id="card"></div>

  <!-- Navigation -->
  <div class="nav">
    <button class="btn btn-ghost" id="bback" onclick="go(-1)" disabled>&#8592; Back</button>
    <button class="btn btn-dark"  id="bnext" onclick="go(1)">Next &#8594;</button>
  </div>

</div>
<script>
var STEPS = [
  {
    title: "Modular monolith — stable",
    pill: null,
    diag: [
      '<div class="arch-box">',
        '<div class="box-lbl">Monolith</div>',
        '<div class="mod mod-a">accounts</div>',
        '<div class="mod mod-b">billing</div>',
        '<div class="mod mod-p">notifications</div>',
      '</div>'
    ].join(''),
    desc: 'All three modules live inside one deployable unit. Each owns its own data and talks to the others only through defined interfaces. <strong>No extraction is planned</strong> — there is no real, named pressure that would justify the added complexity of a distributed system.'
  },
  {
    title: "A pressure appears",
    pill: { text: "trigger", cls: "pill-orange" },
    diag: [
      '<div class="arch-box">',
        '<div class="box-lbl">Monolith</div>',
        '<div class="mod mod-a">accounts</div>',
        '<div class="mod mod-b">billing</div>',
        '<div class="mod mod-p pressure">',
          'notifications <span class="tag tag-o">&#9889; scaling</span>',
        '</div>',
      '</div>'
    ].join(''),
    desc: 'The notifications module now needs far more compute than the rest of the app during peak hours. Scaling the whole monolith just to feed this one part is getting expensive. This is a <strong>real, named pressure</strong> — independent scaling — exactly the kind that justifies pulling a module out.'
  },
  {
    title: "New service starts — partial traffic",
    pill: { text: "strangler fig", cls: "pill-purple" },
    diag: [
      '<div class="arch-box">',
        '<div class="box-lbl">Monolith</div>',
        '<div class="mod mod-a">accounts</div>',
        '<div class="mod mod-b">billing</div>',
        '<div class="mod mod-p dim">notifications</div>',
      '</div>',
      '<div class="arr">',
        '<div class="arr-row">',
          '<div class="arr-shaft" style="background:rgba(135,84,253,0.55);"></div>',
          '<div class="arr-head"  style="border-left:8px solid rgba(135,84,253,0.55);"></div>',
        '</div>',
        '<span class="arr-txt">some traffic</span>',
        '<span class="arr-dn">&#8595;</span>',
        '<span class="arr-dn-txt">some traffic</span>',
      '</div>',
      '<div class="arch-box b-purple">',
        '<div class="box-lbl">New service</div>',
        '<div class="mod mod-p">notifications <span class="tag tag-p">partial</span></div>',
      '</div>'
    ].join(''),
    desc: 'The new notifications service is stood up <em>alongside</em> the still-running monolith. A slice of traffic is forwarded to the new service while the old code path handles the rest. <strong>No risky cutover.</strong> The system keeps working throughout — this is the strangler fig pattern.'
  },
  {
    title: "Old path retired — extraction complete",
    pill: { text: "complete", cls: "pill-green" },
    diag: [
      '<div class="arch-box">',
        '<div class="box-lbl">Monolith</div>',
        '<div class="mod mod-a">accounts</div>',
        '<div class="mod mod-b">billing</div>',
      '</div>',
      '<div class="arr">',
        '<div class="arr-row">',
          '<div class="arr-shaft" style="background:rgba(50,143,81,0.60);"></div>',
          '<div class="arr-head"  style="border-left:8px solid rgba(50,143,81,0.60);"></div>',
        '</div>',
        '<span class="arr-txt">all traffic</span>',
        '<span class="arr-dn">&#8595;</span>',
        '<span class="arr-dn-txt">all traffic</span>',
      '</div>',
      '<div class="arch-box b-green">',
        '<div class="box-lbl">Notifications service</div>',
        '<div class="mod mod-pg">notifications <span class="tag tag-g">owns it</span></div>',
      '</div>'
    ].join(''),
    desc: 'The new service now owns all notification traffic. The old module is <strong>removed from the monolith</strong>. The monolith is lighter; the service scales independently. The whole migration happened step by step, system live throughout — never a moment where everything switched at once.'
  }
];

var cur = 0;

function render() {
  for (var i = 0; i < STEPS.length; i++) {
    document.getElementById('d' + i).className = 'dot' + (i === cur ? ' on' : '');
  }
  document.getElementById('slbl').textContent = 'Step ' + (cur + 1) + ' of ' + STEPS.length;

  var s = STEPS[cur];
  var pillHtml = s.pill
    ? '<span class="pill ' + s.pill.cls + '">' + s.pill.text + '</span>'
    : '';

  document.getElementById('card').innerHTML =
    '<div class="card-head">' +
      '<span class="card-head-title">' + s.title + '</span>' +
      pillHtml +
    '</div>' +
    '<div class="diagram fade">' + s.diag + '</div>' +
    '<div class="desc fade">' + s.desc + '</div>';

  document.getElementById('bback').disabled = (cur === 0);
  document.getElementById('bnext').textContent =
    cur === STEPS.length - 1 ? 'Restart ↺' : 'Next →';
}

function go(dir) {
  if (dir === 1 && cur === STEPS.length - 1) { cur = 0; }
  else { cur = Math.max(0, Math.min(STEPS.length - 1, cur + dir)); }
  render();
}

render();
</script>
</body>
</html>
