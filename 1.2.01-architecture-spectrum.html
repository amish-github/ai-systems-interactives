<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architecture Spectrum — What Each Architecture Actually Is</title>
  <style>
    @font-face {
      font-family: 'Suisse Intl';
      src: url('https://d2jcw3k6onjdla.cloudfront.net/fonts/suisse/SuisseIntl-Regular-WebM.woff2') format('woff2');
      font-weight: 400;
    }
    @font-face {
      font-family: 'Suisse Intl Mono';
      src: url('https://d2jcw3k6onjdla.cloudfront.net/fonts/suisse/SuisseIntlMono-Regular-WebS.woff2') format('woff2');
      font-weight: 400;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Suisse Intl', system-ui, -apple-system, sans-serif;
      font-size: 18px;
      color: #1A1A1A;
      background: #ffffff;
      display: flex;
      justify-content: center;
    }

    .wrap {
      width: 100%;
      max-width: 700px;
    }

    /* ── Hint header ── */
    .hint {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 24px;
      background: #F2F1EE;
      border-bottom: 1px solid rgba(0,0,0,0.14);
    }

    .hint svg {
      flex-shrink: 0;
      animation: wiggle 4s ease-in-out infinite;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      20%       { transform: rotate(-10deg); }
      40%       { transform: rotate(10deg); }
      55%       { transform: rotate(-8deg); }
      70%       { transform: rotate(6deg); }
      85%       { transform: rotate(-3deg); }
    }

    .hint-text { font-size: 18px; line-height: 1.4; }

    /* ── Spectrum ── */
    .spectrum {
      padding: 20px 24px 0;
    }

    .spectrum-label {
      font-size: 14px;
      color: rgba(0,0,0,0.50);
      margin-bottom: 12px;
    }

    .spectrum-rail {
      position: relative;
      display: flex;
      align-items: flex-start;
      padding-top: 10px;
    }

    .spectrum-rail::before {
      content: '';
      position: absolute;
      top: 20px;
      left: 12.5%;
      right: 12.5%;
      height: 2px;
      background: rgba(0,0,0,0.12);
      pointer-events: none;
    }

    .spec-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0 4px;
      font-family: 'Suisse Intl', system-ui, sans-serif;
    }

    .spec-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ffffff;
      border: 2px solid rgba(0,0,0,0.18);
      position: relative;
      z-index: 1;
      transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
      flex-shrink: 0;
    }

    .spec-btn:hover .spec-dot       { border-color: #1878DC; transform: scale(1.25); }
    .spec-btn.active .spec-dot      { background: #1878DC; border-color: #1878DC; }
    .spec-btn.warn:hover .spec-dot  { border-color: #DE4C45; transform: scale(1.25); }
    .spec-btn.warn.active .spec-dot { background: #DE4C45; border-color: #DE4C45; }

    .spec-lbl {
      font-size: 12px;
      color: rgba(0,0,0,0.45);
      text-align: center;
      line-height: 1.3;
      max-width: 72px;
      transition: color 0.15s ease;
    }

    .spec-btn.active .spec-lbl      { color: #1878DC; }
    .spec-btn.warn.active .spec-lbl { color: #DE4C45; }

    /* ── Card ── */
    .card {
      margin: 16px 24px 0;
      border: 1px solid rgba(0,0,0,0.14);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 0.5px 0 rgba(0,0,0,0.30), 0 1px 3px 0 rgba(0,0,0,0.15);
    }

    .card-head {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 16px 20px;
      background: #F2F1EE;
      border-bottom: 1px solid rgba(0,0,0,0.14);
    }

    .chip {
      font-family: 'Suisse Intl Mono', 'Courier New', monospace;
      font-size: 13px;
      padding: 2px 8px;
      border-radius: 6px;
      line-height: 1.6;
      white-space: nowrap;
    }

    .chip-num    { background: #ffffff; border: 1px solid rgba(0,0,0,0.14); color: rgba(0,0,0,0.50); }
    .chip-blue   { background: rgba(24,120,220,0.12); color: #1878DC; }
    .chip-green  { background: rgba(50,143,81,0.12);  color: #328F51; }
    .chip-red    { background: rgba(222,76,69,0.12);  color: #DE4C45; }

    .card-title {
      font-size: 20px;
      color: #1A1A1A;
      line-height: 1.2;
    }

    /* ── Diagram ── */
    .diagram {
      padding: 24px 20px 16px;
      background: #ffffff;
      display: flex;
      justify-content: center;
    }

    .diagram svg {
      width: 100%;
      max-width: 480px;
      height: auto;
      display: block;
    }

    /* ── Properties ── */
    .props {
      padding: 0 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .prop {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      background: #F2F1EE;
      border-radius: 12px;
      font-size: 16px;
      line-height: 1.5;
    }

    .prop-icon { flex-shrink: 0; font-size: 15px; margin-top: 2px; }

    /* ── Callout ── */
    .callout {
      margin: 0 24px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 16px;
      line-height: 1.6;
    }

    .callout-blue  { background: rgba(24,120,220,0.08); border-left: 3px solid #1878DC; }
    .callout-green { background: rgba(50,143,81,0.08);  border-left: 3px solid #328F51; }
    .callout-red   { background: rgba(222,76,69,0.08);  border-left: 3px solid #DE4C45; }

    /* ── Navigation ── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px 24px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.14);
      background: #ffffff;
      font-family: 'Suisse Intl', system-ui, sans-serif;
      font-size: 16px;
      color: #1A1A1A;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      box-shadow: 0 0 0.5px 0 rgba(0,0,0,0.30), 0 1px 3px 0 rgba(0,0,0,0.15);
    }

    .nav-btn:hover:not(:disabled) { background: #F2F1EE; border-color: rgba(0,0,0,0.24); }
    .nav-btn:disabled { opacity: 0.30; cursor: default; box-shadow: none; }

    .nav-count {
      font-family: 'Suisse Intl Mono', monospace;
      font-size: 14px;
      color: rgba(0,0,0,0.45);
    }

    /* ── Fade-up transition ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .anim { animation: fadeUp 0.22s ease; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .hint, .spectrum, .nav { padding-left: 16px; padding-right: 16px; }
      .card { margin-left: 16px; margin-right: 16px; }
      .callout { margin-left: 16px; margin-right: 16px; }
      .card-head { padding: 12px 16px; }
      .diagram { padding: 20px 16px 12px; }
      .props { padding: 0 16px 16px; }
      .card-title { font-size: 18px; }
      .hint-text  { font-size: 16px; }
      .nav-btn    { padding: 10px 16px; font-size: 15px; }
    }

    @media (max-width: 360px) {
      .hint, .spectrum, .nav { padding-left: 12px; padding-right: 12px; }
      .card { margin-left: 12px; margin-right: 12px; }
      .callout { margin-left: 12px; margin-right: 12px; }
      .spec-lbl { font-size: 10px; max-width: 60px; }
      .nav-btn { padding: 8px 12px; }
    }
  </style>
</head>

      </button>
      <button class="spec-btn" onclick="goTo(1)">

      </button>
      <button class="spec-btn" onclick="goTo(2)">
        <div class="spec-dot"></div>
        <div class="spec-lbl">Microservices</div>
      </button>
      <button class="spec-btn warn" onclick="goTo(3)">
        <div class="spec-dot"></div>
        <div class="spec-lbl">Distributed Monolith</div>
      </button>
    </div>
  </div>

  <!-- Card -->
  <div class="card" id="card">
    <div class="card-head">
      <span class="chip chip-num" id="num">01</span>
      <span class="card-title" id="title">Monolith</span>
      <span class="chip chip-blue" id="badge">One deployment</span>
    </div>
    <div class="diagram" id="diagram"></div>
    <div class="props"   id="props"></div>
  </div>

  <div style="height:16px"></div>
  <div class="callout callout-blue" id="callout"></div>

  <!-- Navigation -->
  <div class="nav">
    <button class="nav-btn" id="prev" onclick="navigate(-1)" disabled>&#8592; Previous</button>
    <span class="nav-count" id="count">1 / 4</span>
    <button class="nav-btn" id="next" onclick="navigate(1)">Next &#8594;</button>
  </div>

</div>

/* ─────────────────────────────────────────
   State & render
───────────────────────────────────────── */
var cur = 0;

function render(idx, animate) {
  var d = DATA[idx];

  document.getElementById('num').textContent = d.num;
  document.getElementById('title').textContent = d.title;

  var badge = document.getElementById('badge');
  badge.textContent = d.badge;
  badge.className = 'chip ' + d.badgeCls;

  document.getElementById('diagram').innerHTML = d.svg;

  document.getElementById('props').innerHTML = d.props.map(function(p) {
    return '<div class="prop"><span class="prop-icon">' + p[0] + '</span><span>' + p[1] + '</span></div>';
  }).join('');

  var callout = document.getElementById('callout');
  callout.className = 'callout ' + d.calloutCls;
  callout.innerHTML = d.callout;

  document.querySelectorAll('.spec-btn').forEach(function(btn, i) {
    btn.classList.toggle('active', i === idx);
  });

  document.getElementById('prev').disabled = (idx === 0);
  document.getElementById('next').disabled = (idx === DATA.length - 1);
  document.getElementById('count').textContent = (idx + 1) + ' / ' + DATA.length;

  if (animate) {
    var card = document.getElementById('card');
    card.classList.remove('anim');
    void card.offsetWidth;
    card.classList.add('anim');
  }
}

function goTo(idx) {
  cur = idx;
  render(idx, true);
}

function navigate(dir) {
  var n = cur + dir;
  if (n >= 0 && n < DATA.length) goTo(n);
}

render(0, false);
</script>
